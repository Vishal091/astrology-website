<!DOCTYPE html>
<html>
<head>
<title>Today's Horoscope 🔮</title>
<meta name="description" content="Daily horoscope for all zodiac signs. Accurate predictions for love, career and money.">

<link rel="stylesheet" href="style.css">

<style>
.horo-card{
  background:#141A40;
  padding:20px;
  border-radius:12px;
  margin-bottom:20px;
  line-height:1.6;
}
.horo-card h2{
  color:gold;
}
.horo-card p{
  margin:8px 0;
}
</style>
</head>

<body>

<header>
<div class="logo">🔮 Astrodhani</div>
<nav>
<a href="index.html">Home</a>
<a href="services.html">Services</a>
</nav>
</header>

<div class="container">

<h1>🔮 Today's Horoscope</h1>

<div id="horoscope"></div>

</div>

<script type="module">

import ModuleFactory from "/swisseph.js";

let Module=null;
let ready=false;

// LOAD SWISS
ModuleFactory({
  locateFile:(f)=>f.endsWith(".wasm")?"/swisseph.wasm":f
}).then(mod=>{
  Module=mod;

  Module.ccall("swe_set_ephe_path",null,["string"],["/ephe"]);
  Module.ccall("swe_set_sid_mode",null,["number","number","number"],[1,0,0]);

  ready=true;
  generateAll();
});

// SIGNS + TRAITS
const signs = [
{name:"Aries",trait:"bold and energetic"},
{name:"Taurus",trait:"stable and practical"},
{name:"Gemini",trait:"curious and communicative"},
{name:"Cancer",trait:"emotional and nurturing"},
{name:"Leo",trait:"confident and expressive"},
{name:"Virgo",trait:"analytical and detail-oriented"},
{name:"Libra",trait:"balanced and diplomatic"},
{name:"Scorpio",trait:"intense and passionate"},
{name:"Sagittarius",trait:"adventurous and optimistic"},
{name:"Capricorn",trait:"disciplined and focused"},
{name:"Aquarius",trait:"innovative and independent"},
{name:"Pisces",trait:"intuitive and dreamy"}
];

// PLANET FUNCTION
function getPlanet(jd, planet){
  const ptr = Module._malloc(8*6);

  Module.ccall(
    "swe_calc_ut",
    null,
    ["number","number","number","number"],
    [jd, planet, 65536, ptr]
  );

  const lon = Module.HEAPF64[ptr/8];
  Module._free(ptr);

  return (lon+360)%360;
}

function getRashiIndex(d){
  return Math.floor(d/30);
}

// 🔥 LONG FORMAT ENGINE
function generateLong(signIndex, planets){

  const s = signs[signIndex];

  const moonH = (getRashiIndex(planets.moon)-signIndex+12)%12+1;
  const satH = (getRashiIndex(planets.saturn)-signIndex+12)%12+1;
  const jupH = (getRashiIndex(planets.jupiter)-signIndex+12)%12+1;

  let overview = `Today brings a mix of experiences for ${s.name} natives. Your ${s.trait} nature will strongly influence how you respond to situations. Staying balanced will help you make the most of opportunities.`;

  let love = `Relationships may require patience and understanding today.`;
  if(moonH===7){
    love = `Love life becomes more active today. Emotional exchanges deepen bonds and bring clarity in relationships.`;
  } else if(moonH===5){
    love = `Romantic energy is high, making it a good day to express your feelings and strengthen connections.`;
  } else if(moonH===1){
    love = `You may feel emotionally expressive and open, which helps improve your love life.`;
  }

  let career = `Work progresses steadily, and consistency will be key.`;
  if(satH===10){
    career = `Your efforts are likely to be recognized at the workplace. This is a good time for growth and responsibility.`;
  } else if(satH===6){
    career = `Challenges or competition may arise in your career. Stay disciplined and focused to overcome them.`;
  } else if(satH===3){
    career = `Communication and effort will bring progress. Short-term efforts can lead to long-term gains.`;
  }

  let money = `Financially, it is a balanced day. Avoid unnecessary risks.`;
  if(jupH===2){
    money = `Financial growth is indicated. You may see gains or improvements in savings.`;
  } else if(jupH===11){
    money = `Income opportunities increase, and gains from multiple sources are possible.`;
  } else if(jupH===5){
    money = `Luck may favor you in speculative matters, but careful planning is still advised.`;
  }

  let health = `Health remains generally stable, but mental peace is important.`;
  if(moonH===6){
    health = `Stress or fatigue may affect your health today. Focus on rest and self-care.`;
  }

  return {overview,love,career,money,health};
}

// MAIN
function generateAll(){

  if(!ready) return;

  const now = new Date();
  const jd = (now/86400000)+2440587.5;

  const planets = {
    moon: getPlanet(jd,1),
    jupiter: getPlanet(jd,5),
    saturn: getPlanet(jd,6)
  };

  let html = "";

  signs.forEach((s,i)=>{

    const p = generateLong(i, planets);

    html += `
    <div class="horo-card">
      <h2>${s.name}</h2>

      <p><b>Overview:</b> ${p.overview}</p>
      <p><b>❤️ Love:</b> ${p.love}</p>
      <p><b>💼 Career:</b> ${p.career}</p>
      <p><b>💰 Money:</b> ${p.money}</p>
      <p><b>🩺 Health:</b> ${p.health}</p>

      <button onclick="window.open('https://wa.me/8708833177','_blank')">
      Talk to Astrologer
      </button>
    </div>
    `;
  });

  document.getElementById("horoscope").innerHTML = html;
}

</script>

</body>
</html>
