<!DOCTYPE html>
<html>
<head>
<title>आज का राशिफल 🔮</title>

<link rel="stylesheet" href="style.css">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:radial-gradient(circle at top,#1a1f4d,#0b0f1a);
color:white;
}

.container{
max-width:1200px;
margin:auto;
padding:20px;
}

h1{
text-align:center;
color:#FFD700;
}

/* FORM */
.kundli-form{
display:flex;
flex-wrap:wrap;
gap:10px;
justify-content:center;
margin-bottom:20px;
}

.kundli-form input, .kundli-form button{
padding:10px;
border-radius:8px;
border:none;
}

.kundli-form button{
background:#FFD700;
font-weight:bold;
cursor:pointer;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
gap:20px;
}

/* CARD */
.horo-card{
background:linear-gradient(145deg,#1a1f4d,#0b0f1a);
padding:18px;
border-radius:18px;
box-shadow:0 10px 30px rgba(0,0,0,0.8);
border:1px solid rgba(255,215,0,0.15);
}

/* REMEDY */
.remedy{
margin-top:10px;
padding:10px;
background:rgba(255,215,0,0.1);
border-radius:10px;
color:#FFD700;
}

/* BUTTONS */
.actions{
display:flex;
gap:10px;
margin-top:10px;
}

.chat-btn{
flex:1;
background:#FFD700;
border:none;
padding:8px;
border-radius:10px;
font-weight:bold;
cursor:pointer;
}

.report-btn{
flex:1;
background:#6C5CE7;
border:none;
padding:8px;
border-radius:10px;
color:white;
cursor:pointer;
}

/* ASTROLOGER MODAL */
.modal{
display:none;
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.8);
justify-content:center;
align-items:center;
}

.modal-content{
background:#1a1f4d;
padding:20px;
border-radius:10px;
width:90%;
max-width:400px;
}

.astro-card{
display:flex;
justify-content:space-between;
padding:10px;
border-bottom:1px solid #333;
}

</style>
</head>

<body>

<div class="container">

<h1>🔮 Personalized Horoscope</h1>

<!-- FORM -->
<div class="kundli-form">
<input id="userName" placeholder="Name">
<input type="date" id="userDob">
<button onclick="generateKundli()">Generate</button>
</div>

<div id="horoscope" class="grid"></div>

</div>

<!-- ASTROLOGER LIST -->
<div id="astroModal" class="modal">
<div class="modal-content">

<h3>Select Astrologer</h3>

<div class="astro-card">
<span>Pandit Sharma</span>
<button onclick="openChat()">Chat</button>
</div>

<div class="astro-card">
<span>Acharya Rahul</span>
<button onclick="openChat()">Chat</button>
</div>

<div class="astro-card">
<span>Guru Prakash</span>
<button onclick="openChat()">Chat</button>
</div>

<button onclick="closeModal()">Close</button>

</div>
</div>

<script>

let userSign = null;

/* SIMPLE KUNDLI (DOB → Zodiac) */
function getZodiac(dob){
const date = new Date(dob);
const day = date.getDate();
const month = date.getMonth()+1;

if((month==3 && day>=21)||(month==4 && day<=19)) return "मेष";
if((month==4 && day>=20)||(month==5 && day<=20)) return "वृषभ";
if((month==5 && day>=21)||(month==6 && day<=20)) return "मिथुन";
if((month==6 && day>=21)||(month==7 && day<=22)) return "कर्क";
if((month==7 && day>=23)||(month==8 && day<=22)) return "सिंह";
if((month==8 && day>=23)||(month==9 && day<=22)) return "कन्या";
if((month==9 && day>=23)||(month==10 && day<=22)) return "तुला";
if((month==10 && day>=23)||(month==11 && day<=21)) return "वृश्चिक";
if((month==11 && day>=22)||(month==12 && day<=21)) return "धनु";
if((month==12 && day>=22)||(month==1 && day<=19)) return "मकर";
if((month==1 && day>=20)||(month==2 && day<=18)) return "कुंभ";
return "मीन";
}

/* GENERATE */
function generateKundli(){

const name = document.getElementById("userName").value;
const dob = document.getElementById("userDob").value;

if(!name || !dob){
alert("Fill details");
return;
}

userSign = getZodiac(dob);

const text = `${name}, आपकी राशि ${userSign} है। आज का दिन आपके लिए सकारात्मक ऊर्जा लेकर आएगा।`;

document.getElementById("horoscope").innerHTML = `
<div class="horo-card">
<h2>${userSign}</h2>
<p>${text}</p>

<div class="remedy">आज: हनुमान चालीसा का पाठ करें</div>

<div class="actions">
<button class="chat-btn" onclick="openAstro()">💬 Consult</button>
<button class="report-btn" onclick="buyReport()">₹99 Report</button>
</div>

</div>`;
}

/* ASTRO MODAL */
function openAstro(){
document.getElementById("astroModal").style.display="flex";
}

function closeModal(){
document.getElementById("astroModal").style.display="none";
}

/* PAYMENT MOCK */
function buyReport(){
alert("Redirecting to payment ₹99 💰 (integrate Razorpay)");
}

/* CHAT (existing) */
function openChat(){
alert("Connect your chat system here");
}

</script>

</body>
</html>
