<!DOCTYPE html>
<html>
<head>
<title>आज का राशिफल 🔮</title>

<link rel="stylesheet" href="style.css">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:radial-gradient(circle at top,#1a1f4d,#0b0f1a);
color:white;
}

.container{
max-width:1300px;
margin:auto;
padding:20px;
}

h1{
text-align:center;
color:#FFD700;
}

/* 🔮 Kundli Form */
.kundli-form{
display:flex;
flex-wrap:wrap;
gap:10px;
justify-content:center;
margin-bottom:20px;
}

.kundli-form input{
padding:10px;
border-radius:8px;
border:none;
}

.kundli-form button{
padding:10px 20px;
background:#FFD700;
border:none;
border-radius:10px;
font-weight:bold;
cursor:pointer;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
gap:20px;
}

/* CARD */
.horo-card{
background:linear-gradient(145deg,#1a1f4d,#0b0f1a);
padding:18px;
border-radius:18px;
box-shadow:0 10px 30px rgba(0,0,0,0.8);
position:relative;
border:1px solid rgba(255,215,0,0.15);
transition:0.3s;
}

.horo-card:hover{
transform:translateY(-5px);
}

/* ICON (zodiac emoji now) */
.icon{
position:absolute;
top:12px;
right:12px;
font-size:24px;
color:#FFD700;
}

/* TITLE */
.horo-card h2{
color:#FFD700;
margin-bottom:6px;
}

/* TEXT */
.horo-card p{
font-size:14px;
color:#ddd;
}

/* REMEDY */
.remedy{
margin-top:12px;
padding:10px;
background:rgba(255,215,0,0.1);
border-radius:10px;
color:#FFD700;
}

/* BUTTONS */
.actions{
display:flex;
gap:10px;
margin-top:10px;
}

.speak-btn{
flex:1;
background:#6C5CE7;
border:none;
padding:8px;
border-radius:10px;
color:white;
cursor:pointer;
}

.chat-btn{
flex:1;
background:#FFD700;
border:none;
padding:8px;
border-radius:10px;
font-weight:bold;
cursor:pointer;
}

</style>
</head>

<body>

<div class="container">

<h1>🔮 राशिफल</h1>

<!-- 🧿 Kundli Input -->
<div class="kundli-form">
<input id="userName" placeholder="Name">
<input type="date" id="userDob">
<input type="time" id="userTime">
<button onclick="saveUser()">Generate</button>
</div>

<div id="horoscope" class="grid"></div>

</div>

<script type="module">

import ModuleFactory from "/swisseph.js";

let Module=null, ready=false;
let userData=null;

ModuleFactory({
 locateFile:(f)=>f.endsWith(".wasm")?"/swisseph.wasm":f
}).then(mod=>{
 Module=mod;
 ready=true;
 loadHoro();
});

/* Zodiac (emoji only now) */
const signs=[
["मेष","♈"],["वृषभ","♉"],["मिथुन","♊"],["कर्क","♋"],
["सिंह","♌"],["कन्या","♍"],["तुला","♎"],["वृश्चिक","♏"],
["धनु","♐"],["मकर","♑"],["कुंभ","♒"],["मीन","♓"]
];

const remedies=[
"हनुमान जी को गुड़-चने का भोग लगाएं",
"महालक्ष्मी को पुष्प अर्पित करें",
"गणेश जी की पूजा करें",
"शिव जी को जल चढ़ाएं",
"सूर्य को अर्घ्य दें",
"बुध मंत्र का जाप करें",
"शुक्र मंत्र का जाप करें",
"हनुमान चालीसा पढ़ें",
"गुरु मंत्र का जाप करें",
"शनि देव को तेल चढ़ाएं",
"कौवों को रोटी खिलाएं",
"विष्णु सहस्रनाम पढ़ें"
];

/* Save Kundli */
window.saveUser=function(){
const name=document.getElementById("userName").value;
const dob=document.getElementById("userDob").value;
const time=document.getElementById("userTime").value;

if(!name || !dob || !time){
alert("Fill all details");
return;
}

userData={name,dob,time};
alert("Kundli generated 🔮");

loadHoro();
}

/* Generate Text */
function generateText(i){
if(userData){
return `${userData.name}, आज का दिन आपके लिए विशेष संकेत दे रहा है।`;
}
return "आज का दिन आपके लिए महत्वपूर्ण रहेगा।";
}

/* Load */
window.loadHoro=function(){

if(!ready) return;

let html="";

signs.forEach((s,i)=>{

const text=generateText(i);

html+=`
<div class="horo-card">

<div class="icon">${s[1]}</div>

<h2>${i+1}. ${s[0]}</h2>

<p>${text}</p>

<div class="remedy">${remedies[i]}</div>

<div class="actions">
<button class="speak-btn" onclick="speakText('${text}')">🔊 सुनें</button>
<button class="chat-btn" onclick="openChat()">💬 Consult</button>
</div>

</div>`;
});

document.getElementById("horoscope").innerHTML=html;
}

/* Voice */
function speakText(text){
const speech=new SpeechSynthesisUtterance(text);
speech.lang="hi-IN";
window.speechSynthesis.speak(speech);
}

</script>

<!-- 🔥 USE YOUR EXISTING CHAT -->
<script src="auth.js"></script>

</body>
</html>
