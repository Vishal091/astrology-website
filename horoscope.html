<!DOCTYPE html>
<html>
<head>
<title>Personalized Horoscope 🔮</title>

<link rel="stylesheet" href="style.css">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:radial-gradient(circle at top,#1a1f4d,#0b0f1a);
color:white;
}

/* CONTAINER */
.container{
max-width:900px;
margin:auto;
padding:20px;
}

/* TITLE */
h1{
text-align:center;
color:#FFD700;
}

/* FORM */
.kundli-form{
display:flex;
flex-wrap:wrap;
gap:10px;
justify-content:center;
margin-bottom:25px;
}

.kundli-form input{
padding:10px;
border-radius:8px;
border:none;
outline:none;
}

.kundli-form button{
padding:10px 20px;
background:linear-gradient(45deg,#FFD700,#ffcc00);
border:none;
border-radius:10px;
font-weight:bold;
cursor:pointer;
}

/* CARD */
.horo-card{
background:linear-gradient(145deg,#1a1f4d,#0b0f1a);
padding:20px;
border-radius:18px;
box-shadow:0 10px 30px rgba(0,0,0,0.8);
border:1px solid rgba(255,215,0,0.2);
color:white;
transition:0.3s;
}

.horo-card:hover{
transform:translateY(-5px);
}

/* TITLE */
.horo-card h2{
color:#FFD700;
margin-bottom:10px;
}

/* TEXT */
.horo-card p{
color:#e0e0e0;
line-height:1.5;
}

/* REMEDY */
.remedy{
margin-top:15px;
padding:12px;
background:rgba(255,215,0,0.12);
border-radius:10px;
color:#FFD700;
}

/* BUTTONS */
.actions{
display:flex;
gap:10px;
margin-top:15px;
}

.chat-btn{
flex:1;
background:linear-gradient(45deg,#ff7a18,#ffd200);
border:none;
padding:10px;
border-radius:10px;
font-weight:bold;
color:white;
cursor:pointer;
}

.report-btn{
flex:1;
background:linear-gradient(45deg,#6C5CE7,#8c7aff);
border:none;
padding:10px;
border-radius:10px;
color:white;
cursor:pointer;
}

/* MODAL */
.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.85);
justify-content:center;
align-items:center;
z-index:999;
}

.modal-content{
background:#1a1f4d;
padding:20px;
border-radius:12px;
width:90%;
max-width:400px;
}

.astro-card{
display:flex;
justify-content:space-between;
padding:10px 0;
border-bottom:1px solid #333;
}

.astro-card button{
background:#FFD700;
border:none;
padding:6px 10px;
border-radius:6px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="container">

<h1>🔮 Personalized Horoscope</h1>

<!-- FORM -->
<div class="kundli-form">
<input id="userName" placeholder="Name">
<input type="date" id="userDob">
<input type="time" id="userTime">
<button onclick="generateKundli()">Generate Kundli</button>
</div>

<div id="horoscope"></div>

</div>

<!-- ASTROLOGER MODAL -->
<div id="astroModal" class="modal">
<div class="modal-content">

<h3>Select Astrologer</h3>

<div class="astro-card">
<span>Pandit Sharma</span>
<button onclick="openChat()">Chat</button>
</div>

<div class="astro-card">
<span>Acharya Rahul</span>
<button onclick="openChat()">Chat</button>
</div>

<div class="astro-card">
<span>Guru Prakash</span>
<button onclick="openChat()">Chat</button>
</div>

<button onclick="closeModal()" style="margin-top:10px;">Close</button>

</div>
</div>

<script type="module">

import ModuleFactory from "/swisseph.js";

let Module = null;

ModuleFactory({
 locateFile:(f)=>f.endsWith(".wasm")?"/swisseph.wasm":f
}).then(mod=>{
 Module = mod;

 Module.ccall("swe_set_ephe_path",null,["string"],["/ephe"]);
 Module.ccall("swe_set_sid_mode",null,["number","number","number"],[1,0,0]);
});

/* 🔮 REAL KUNDLI */
window.generateKundli = function(){

const name = document.getElementById("userName").value;
const dob = document.getElementById("userDob").value;
const time = document.getElementById("userTime").value || "12:00";

if(!name || !dob){
alert("Fill all details");
return;
}

// Convert date
const dt = new Date(`${dob}T${time}`);
const jd = (dt/86400000)+2440587.5;

// Moon calc
const ptr = Module._malloc(8*6);

Module.ccall("swe_calc_ut", null,
["number","number","number","number"],
[jd, 1, 65536, ptr]
);

const moonLon = Module.HEAPF64[ptr/8];
Module._free(ptr);

const rashiIndex = Math.floor(moonLon / 30);

const rashis = [
"मेष","वृषभ","मिथुन","कर्क",
"सिंह","कन्या","तुला","वृश्चिक",
"धनु","मकर","कुंभ","मीन"
];

const userSign = rashis[rashiIndex];

const text = `${name}, आपकी चंद्र राशि ${userSign} है। आज चंद्रमा की स्थिति आपके विचार और निर्णयों को प्रभावित करेगी।`;

document.getElementById("horoscope").innerHTML = `
<div class="horo-card">

<h2>${userSign} (Moon Sign)</h2>

<p>${text}</p>

<div class="remedy">
🧿 सोमवार को शिव जी को जल अर्पित करें
</div>

<div class="actions">
<button class="chat-btn" onclick="openAstro()">💬 Consult</button>
<button class="report-btn" onclick="buyReport()">₹99 Report</button>
</div>

</div>`;
};

/* MODAL */
window.openAstro = function(){
document.getElementById("astroModal").style.display="flex";
};

window.closeModal = function(){
document.getElementById("astroModal").style.display="none";
};

/* PAYMENT */
window.buyReport = function(){
alert("Integrate Razorpay here ₹99");
};

</script>

<!-- Your chat system -->
<script src="auth.js"></script>

</body>
</html>
