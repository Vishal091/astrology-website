<!DOCTYPE html>
<html>
<head>
<title>Horoscope 🔮</title>

<link rel="stylesheet" href="style.css">

<style>
.tabs{
display:flex;
gap:10px;
margin-bottom:20px;
}

.tabs button{
padding:10px 15px;
border:none;
border-radius:8px;
cursor:pointer;
background:#222;
color:white;
}

.tabs button.active{
background:gold;
color:black;
}

.horo-card{
background:#141A40;
padding:20px;
border-radius:12px;
margin-bottom:20px;
line-height:1.6;
}

.recommend{
margin-top:12px;
padding:10px;
background:#0b0f1a;
border-radius:8px;
}

.recommend button{
margin-left:10px;
padding:4px 8px;
font-size:12px;
border:none;
border-radius:6px;
cursor:pointer;
background:gold;
}
</style>
</head>

<body>

<header>
<div class="logo">🔮 Astrodhani</div>
<nav>
<a href="index.html">Home</a>
<a href="services.html">Services</a>
</nav>
</header>

<div class="container">

<h1>🔮 Horoscope</h1>

<div class="tabs">
<button onclick="loadHoro(0,this)" class="active">Daily</button>
<button onclick="loadHoro(7,this)">Weekly</button>
<button onclick="loadHoro(30,this)">Monthly</button>
</div>

<div id="horoscope"></div>

</div>

<script type="module">

import ModuleFactory from "/swisseph.js";

let Module=null, ready=false;

ModuleFactory({
  locateFile:(f)=>f.endsWith(".wasm")?"/swisseph.wasm":f
}).then(mod=>{
  Module=mod;

  Module.ccall("swe_set_ephe_path",null,["string"],["/ephe"]);
  Module.ccall("swe_set_sid_mode",null,["number","number","number"],[1,0,0]);

  ready=true;
  loadHoro(0, document.querySelector(".tabs button"));
});

// SIGNS
const signs = [
{name:"Aries",trait:"bold and energetic"},
{name:"Taurus",trait:"stable and practical"},
{name:"Gemini",trait:"curious and communicative"},
{name:"Cancer",trait:"emotional and nurturing"},
{name:"Leo",trait:"confident and expressive"},
{name:"Virgo",trait:"analytical and detail-oriented"},
{name:"Libra",trait:"balanced and diplomatic"},
{name:"Scorpio",trait:"intense and passionate"},
{name:"Sagittarius",trait:"adventurous and optimistic"},
{name:"Capricorn",trait:"disciplined and focused"},
{name:"Aquarius",trait:"innovative and independent"},
{name:"Pisces",trait:"intuitive and dreamy"}
];

// PLANET
function getPlanet(jd,p){
  const ptr=Module._malloc(8*6);

  Module.ccall("swe_calc_ut",null,
    ["number","number","number","number"],
    [jd,p,65536,ptr]
  );

  const lon=Module.HEAPF64[ptr/8];
  Module._free(ptr);

  return (lon+360)%360;
}

function rashi(d){ return Math.floor(d/30); }

// 🔮 SERVICE SUGGESTION ENGINE
function getServiceSuggestion(moonH, satH, jupH){

  if(satH===6 || satH===8 || satH===12){
    return [
      {name:"Shani Shanti Pooja", price:5000},
      {name:"Career Healing", price:1100}
    ];
  }

  if(jupH===2 || jupH===11){
    return [
      {name:"Dhan Akarshan Lakshmi Pooja", price:3000},
      {name:"Money Magnet Healing", price:1100}
    ];
  }

  if(moonH===5 || moonH===7){
    return [
      {name:"Love Attraction Healing", price:1100},
      {name:"Relationship Healing", price:5000}
    ];
  }

  return [
    {name:"Aura Cleansing", price:1100}
  ];
}

// 🔥 PREDICTION ENGINE
function generate(signIndex, planets, type){

  const s = signs[signIndex];

  const moonH=(rashi(planets.moon)-signIndex+12)%12+1;
  const satH=(rashi(planets.saturn)-signIndex+12)%12+1;
  const jupH=(rashi(planets.jupiter)-signIndex+12)%12+1;

  let prefix = type==="daily"?"Today":
               type==="weekly"?"This week":
               "This month";

  let overview = `${prefix}, ${s.name} natives may experience a mix of opportunities and challenges. Your ${s.trait} nature will help you handle situations wisely.`;

  let love = "Relationships need patience.";
  if(moonH===7) love=`${prefix}, relationships improve and emotional bonding increases.`;
  if(moonH===5) love=`${prefix}, romance and attraction are strong.`;

  let career = "Work remains stable.";
  if(satH===10) career=`${prefix}, recognition and growth are likely in career.`;
  if(satH===6) career=`${prefix}, work pressure may increase but discipline will help.`;

  let money = "Maintain financial balance.";
  if(jupH===2) money=`${prefix}, financial growth and savings improve.`;
  if(jupH===11) money=`${prefix}, gains and income opportunities increase.`;

  let health = `${prefix}, take care of mental peace and rest.`;

  const suggestions = getServiceSuggestion(moonH, satH, jupH);

  return {overview,love,career,money,health,suggestions};
}

// MAIN
window.loadHoro = function(offset, btn){

  if(!ready) return;

  document.querySelectorAll(".tabs button").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");

  const date = new Date();
  date.setDate(date.getDate() + offset);

  const jd = (date/86400000)+2440587.5;

  const planets = {
    moon:getPlanet(jd,1),
    jupiter:getPlanet(jd,5),
    saturn:getPlanet(jd,6)
  };

  let type = offset===0?"daily":offset===7?"weekly":"monthly";

  let html="";

  signs.forEach((s,i)=>{

    const p = generate(i, planets, type);

    html+=`
    <div class="horo-card">
      <h2>${s.name}</h2>

      <p><b>Overview:</b> ${p.overview}</p>
      <p><b>❤️ Love:</b> ${p.love}</p>
      <p><b>💼 Career:</b> ${p.career}</p>
      <p><b>💰 Money:</b> ${p.money}</p>
      <p><b>🩺 Health:</b> ${p.health}</p>

      <div class="recommend">
        <b>🔮 Recommended for you:</b>

        ${p.suggestions.map(s => `
          <div>
            ${s.name} - ₹${s.price}
            <button onclick="bookService('${s.name}', ${s.price})">Book</button>
          </div>
        `).join("")}
      </div>

      <button onclick="window.open('https://wa.me/8708833177','_blank')">
      Talk to Astrologer
      </button>

    </div>
    `;
  });

  document.getElementById("horoscope").innerHTML = html;
}

// BOOK FLOW
function bookService(name,price){
  localStorage.setItem("selectedService", JSON.stringify({name,price}));
  window.location.href="kundli.html";
}

</script>

</body>
</html>
