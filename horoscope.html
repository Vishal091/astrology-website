<!DOCTYPE html>
<html>
<head>
<title>राशिफल 🔮</title>
<link rel="stylesheet" href="style.css">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* ===== BODY ===== */
body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:#0b0f1a;
color:white;
}

/* ===== HEADER ===== */
.app-header{
background:#7B1E1E;
padding:15px;
border-bottom-left-radius:20px;
border-bottom-right-radius:20px;
}

.top-bar{
display:flex;
justify-content:space-between;
font-weight:bold;
}

.search-bar input{
width:100%;
padding:10px;
border-radius:25px;
border:none;
margin-top:10px;
}

/* ===== ZODIAC SLIDER ===== */
.zodiac-scroll{
display:flex;
overflow-x:auto;
gap:12px;
padding:15px;
}

.zodiac{
min-width:70px;
text-align:center;
cursor:pointer;
}

.zodiac.active{
color:#FFD700;
}

/* ===== GRID ===== */
.grid{
padding:15px;
display:grid;
gap:15px;
}

/* ===== CARD ===== */
.horo-card{
background:#141A40;
padding:15px;
border-radius:15px;
box-shadow:0 5px 20px rgba(0,0,0,0.6);
}

.horo-top{
display:flex;
align-items:center;
gap:10px;
}

.avatar{
width:45px;
height:45px;
border-radius:50%;
background:#FFD700;
color:black;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
}

.rating{
font-size:12px;
color:#FFD700;
}

.remedy{
margin-top:10px;
padding:10px;
background:#0b0f1a;
border-left:3px solid gold;
border-radius:8px;
}

/* BUTTONS */
.actions{
display:flex;
gap:10px;
margin-top:10px;
}

.chat-btn{
flex:1;
background:#FFD700;
border:none;
padding:8px;
border-radius:10px;
font-weight:bold;
}

.call-btn{
flex:1;
background:#222;
border:none;
padding:8px;
border-radius:10px;
color:white;
}

/* SPEAK */
.speak-btn{
margin-top:8px;
background:#6C5CE7;
border:none;
padding:6px;
border-radius:8px;
color:white;
}

/* MOBILE */
@media(max-width:768px){
.grid{grid-template-columns:1fr;}
}

</style>
</head>

<body>

<!-- 🔥 APP HEADER -->
<div class="app-header">
<div class="top-bar">
<span>🔮 Astrodhani</span>
<span>₹0</span>
</div>

<div class="search-bar">
<input placeholder="Search horoscope...">
</div>
</div>

<!-- 🔥 ZODIAC SCROLL -->
<div class="zodiac-scroll" id="zodiacList"></div>

<!-- 🔥 GRID -->
<div id="horoscope" class="grid"></div>

<script type="module">

import ModuleFactory from "/swisseph.js";

let Module=null, ready=false;

ModuleFactory({
 locateFile:(f)=>f.endsWith(".wasm")?"/swisseph.wasm":f
}).then(mod=>{
 Module=mod;
 Module.ccall("swe_set_ephe_path",null,["string"],["/ephe"]);
 Module.ccall("swe_set_sid_mode",null,["number","number","number"],[1,0,0]);
 ready=true;
 initUI();
});

// DATA
const signs=[
["मेष","♈"],["वृषभ","♉"],["मिथुन","♊"],["कर्क","♋"],
["सिंह","♌"],["कन्या","♍"],["तुला","♎"],["वृश्चिक","♏"],
["धनु","♐"],["मकर","♑"],["कुंभ","♒"],["मीन","♓"]
];

const remedies=[
"हनुमान जी को गुड़-चने का भोग लगाएं",
"महालक्ष्मी को पुष्प अर्पित करें",
"गणेश जी की पूजा करें",
"शिव जी को जल चढ़ाएं",
"सूर्य को अर्घ्य दें",
"बुध मंत्र का जाप करें",
"शुक्र मंत्र का जाप करें",
"हनुमान चालीसा पढ़ें",
"गुरु मंत्र का जाप करें",
"शनि देव को तेल चढ़ाएं",
"कौवों को रोटी खिलाएं",
"विष्णु सहस्रनाम पढ़ें"
];

// INIT UI
function initUI(){
 renderZodiac();
 loadHoro(0);
}

// ZODIAC UI
function renderZodiac(){
 let html="";
 signs.forEach((s,i)=>{
  html+=`<div class="zodiac" onclick="loadHoro(${i})">${s[1]}<br>${s[0]}</div>`;
 });
 document.getElementById("zodiacList").innerHTML=html;
}

// PLANETS
function getPlanet(jd,p){
 const ptr=Module._malloc(8*6);
 Module.ccall("swe_calc_ut",null,
 ["number","number","number","number"],
 [jd,p,65536,ptr]
 );
 const lon=Module.HEAPF64[ptr/8];
 Module._free(ptr);
 return (lon+360)%360;
}

function rashi(d){return Math.floor(d/30);}

// TEXT
function generateText(i, planets){
 return "आज का दिन आपके लिए महत्वपूर्ण रहेगा।";
}

// LOAD
window.loadHoro=function(i){

 if(!ready) return;

 const date=new Date();
 const jd=(date/86400000)+2440587.5;

 const planets={
  moon:getPlanet(jd,1),
  jupiter:getPlanet(jd,5),
  saturn:getPlanet(jd,6)
 };

 let html="";

 const text=generateText(i,planets);

 html+=`
 <div class="horo-card">

  <div class="horo-top">
    <div class="avatar">${signs[i][1]}</div>
    <div>
      <b>${signs[i][0]}</b>
      <div class="rating">⭐ 4.8</div>
    </div>
  </div>

  <p>${text}</p>

  <div class="remedy">${remedies[i]}</div>

  <button class="speak-btn" onclick="speakText('${text}')">
    🔊 सुनें
  </button>

  <div class="actions">
    <button class="chat-btn">💬 Chat</button>
    <button class="call-btn">📞 Call</button>
  </div>

 </div>`;

 document.getElementById("horoscope").innerHTML=html;
}

// VOICE
function speakText(text){
 const speech=new SpeechSynthesisUtterance(text);
 speech.lang="hi-IN";
 window.speechSynthesis.speak(speech);
}

</script>

</body>
</html>
