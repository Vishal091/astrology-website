
<!DOCTYPE html>
<html>
<head>
<title>Official Vedic Panchang 🔮</title>

<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/astronomy-engine@2.1.19/astronomy.browser.min.js"></script>

<style>
body{
background:#0b0f2a;
color:white;
font-family: 'Segoe UI', sans-serif;
line-height:1.6;
}

.container{
max-width:900px;
margin:auto;
padding:30px;
}

.card{
background:linear-gradient(145deg,#141A40,#0b0f2a);
padding:25px;
border-radius:16px;
box-shadow:0 0 25px rgba(255,215,0,0.2);
}

.section{
margin:20px 0;
padding-top:10px;
border-top:1px solid rgba(255,255,255,0.1);
}

h1,h2{
text-align:center;
}

.highlight{
color:#F9CA24;
}

button{
background:#F9CA24;
color:black;
padding:10px 20px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

<h1>🔱 SHIV SHAKTI JYOTISH FOUNDATION</h1>
<p style="text-align:center;">👑 परम पूज्य पं. शुभम शास्त्री जी</p>

<div style="text-align:center;margin:20px;">
<input type="date" id="date">
<button onclick="getLocation()">🔮 पंचांग देखें</button>
</div>

<div id="result"></div>

</div>

<script>

let userLat = 28.6139
let userLon = 77.2090

function getLocation(){
if(navigator.geolocation){
navigator.geolocation.getCurrentPosition(
(pos)=>{
userLat = pos.coords.latitude
userLon = pos.coords.longitude
calculatePanchang()
},
()=> calculatePanchang()
)
}else calculatePanchang()
}

function calculatePanchang(){

let dateInput = document.getElementById("date").value
if(!dateInput){ alert("तिथि चुनें"); return }

let sunrise = new Date(dateInput+"T06:00:00")
let time = Astronomy.MakeTime(sunrise)

let earth = Astronomy.HelioVector("Earth", time)
let sunLon = (earth.elon + 180) % 360
let moonLon = Astronomy.EclipticLongitude("Moon", time)

let diff = (moonLon - sunLon + 360) % 360
let tithiNum = Math.floor(diff/12)+1

let paksha = tithiNum <= 15 ? "शुक्ल पक्ष" : "कृष्ण पक्ष"

const tithiNames = ["प्रतिपदा","द्वितीया","तृतीया","चतुर्थी","पंचमी","षष्ठी","सप्तमी","अष्टमी","नवमी","दशमी","एकादशी","द्वादशी","त्रयोदशी","चतुर्दशी","पूर्णिमा","प्रतिपदा","द्वितीया","तृतीया","चतुर्थी","पंचमी","षष्ठी","सप्तमी","अष्टमी","नवमी","दशमी","एकादशी","द्वादशी","त्रयोदशी","चतुर्दशी","अमावस्या"]

const nakNames = ["अश्विनी","भरणी","कृत्तिका","रोहिणी","मृगशिरा","आर्द्रा","पुनर्वसु","पुष्य","आश्लेषा","मघा","पूर्वा फाल्गुनी","उत्तर फाल्गुनी","हस्त","चित्रा","स्वाति","विशाखा","अनुराधा","ज्येष्ठा","मूल","पूर्वाषाढ़ा","उत्तराषाढ़ा","श्रवण","धनिष्ठा","शतभिषा","पूर्व भाद्रपद","उत्तर भाद्रपद","रेवती"]

let nakNum = Math.floor(moonLon/(360/27))
let nakName = nakNames[nakNum]

let today = new Date(dateInput)
let weekday = today.toLocaleDateString('hi-IN',{weekday:'long'})

// Basic placeholder logic
let karana = "बव"
let yoga = "वज्र योग"

// Festival logic (simple)
let festival = ""
if(tithiNames[tithiNum-1] === "अमावस्या") festival = "🪔 अमावस्या विशेष"

// Rashifal
const rashifal = [
"मेष: ऊर्जा बढ़ेगी",
"वृषभ: धन लाभ",
"मिथुन: नए संपर्क",
"कर्क: परिवार सुख",
"सिंह: प्रतिष्ठा",
"कन्या: सफलता",
"तुला: संबंध बेहतर",
"वृश्चिक: तनाव कम",
"धनु: धर्म रुचि",
"मकर: लाभ",
"कुंभ: नई दिशा",
"मीन: शांति"
]

document.getElementById("result").innerHTML = `
<div class="card">

<h2>🕉️ आधिकारिक वैदिक पंचांग</h2>

<p style="text-align:center;">
📅 ${dateInput} | ${weekday}<br>
📍 स्थान: (${userLat.toFixed(2)}, ${userLon.toFixed(2)})<br>
🌙 पक्ष: ${paksha}
</p>

${festival ? `<p class="highlight">🎉 ${festival}</p>` : ""}

<div class="section">
<h3>🔹 तिथि</h3>
<p>${tithiNames[tithiNum-1]}</p>
</div>

<div class="section">
<h3>🌟 नक्षत्र</h3>
<p>${nakName}</p>
</div>

<div class="section">
<h3>🔱 करण</h3>
<p>${karana}</p>
</div>

<div class="section">
<h3>✨ योग</h3>
<p>${yoga}</p>
</div>

<div class="section">
<h3>📆 वार विशेष</h3>
<p>${weekday}</p>
</div>

<div class="section">
<h3>🌺 गहन ज्योतिषीय विश्लेषण</h3>
<p>आज का दिन प्रयास और आत्मविश्वास का है।</p>
</div>

<div class="section">
<h3>🔮 राशिफल</h3>
${rashifal.map(r => `<p>${r}</p>`).join("")}
</div>

<div class="section">
<h3>📜 दिव्य संदेश</h3>
<p>“सफलता उन्हीं को मिलती है जो लक्ष्य के प्रति अडिग रहते हैं।”</p>
</div>

<div style="text-align:center;margin-top:20px;">
<button onclick="window.open('https://wa.me/918708833177')">
📞 ज्योतिष परामर्श
</button>
</div>

<p style="text-align:center;margin-top:20px;font-size:12px;">
© SHIV SHAKTI JYOTISH FOUNDATION
</p>

</div>
`
}

</script>

</body>
</html>
