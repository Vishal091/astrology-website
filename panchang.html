<div class="container">

<h1>🔮 Panchang (Pro)</h1>
<p>Accurate Panchang with Rahu Kaal, Muhurat, Choghadiya & Festivals</p>

<input type="date" id="date">
<button onclick="getLocation()">Get Panchang</button>

<div id="result"></div>

</div>

<script>

let userLat = 28.6139
let userLon = 77.2090

function getLocation(){
if(navigator.geolocation){
navigator.geolocation.getCurrentPosition(
(pos)=>{
userLat = pos.coords.latitude
userLon = pos.coords.longitude
calculatePanchang()
},
()=> calculatePanchang()
)
}else{
calculatePanchang()
}
}

function calculateRahuKaal(sunrise, sunset){
let day = sunrise.getDay()
let rahuMap = [8,2,7,5,6,4,3]

let total = (sunset - sunrise)/8
let index = rahuMap[day] - 1

let start = new Date(sunrise.getTime() + total*index)
let end = new Date(start.getTime() + total)

return {
start: start.toLocaleTimeString(),
end: end.toLocaleTimeString()
}
}

function getMuhurat(tithiNum){
if([4,9,14].includes(tithiNum)) return "❌ Ashubh"
if([1,5,10].includes(tithiNum)) return "✅ Shubh"
return "⚖️ Neutral"
}

function getChoghadiya(sunrise, sunset){

const dayNames = ["Udveg","Chal","Labh","Amrit","Kaal","Shubh","Rog","Udveg"]
const nightNames = ["Shubh","Amrit","Chal","Rog","Kaal","Labh","Udveg","Shubh"]

let dayDuration = (sunset - sunrise) / 8
let nightDuration = (24*60*60*1000 - (sunset - sunrise)) / 8

let daySlots = []
let nightSlots = []

for(let i=0;i<8;i++){
let start = new Date(sunrise.getTime() + i*dayDuration)
let end = new Date(start.getTime() + dayDuration)

daySlots.push({
name: dayNames[i],
time: start.toLocaleTimeString() + " - " + end.toLocaleTimeString()
})
}

for(let i=0;i<8;i++){
let start = new Date(sunset.getTime() + i*nightDuration)
let end = new Date(start.getTime() + nightDuration)

nightSlots.push({
name: nightNames[i],
time: start.toLocaleTimeString() + " - " + end.toLocaleTimeString()
})
}

return {daySlots, nightSlots}
}

// 🔥 ADVANCED FESTIVAL ENGINE
function detectFestival(tithi, paksha, nak, month){

let f = []

if(tithi === "Amavasya" && paksha === "Krishna Paksha" && month === "Kartik"){
f.push("🪔 Diwali")
}

if(tithi === "Ashtami" && paksha === "Krishna Paksha" && month === "Bhadrapada" && nak === "Rohini"){
f.push("🎂 Krishna Janmashtami")
}

if(tithi === "Chaturdashi" && paksha === "Krishna Paksha" && month === "Phalguna"){
f.push("🕉️ Maha Shivratri")
}

if(tithi === "Navami" && paksha === "Shukla Paksha" && month === "Chaitra"){
f.push("🏹 Ram Navami")
}

if(tithi === "Chaturthi" && paksha === "Shukla Paksha" && month === "Bhadrapada"){
f.push("🐘 Ganesh Chaturthi")
}

if(tithi === "Ashtami" && paksha === "Shukla Paksha" && month === "Ashwin"){
f.push("🌺 Durga Ashtami")
}

if(tithi === "Dashami" && paksha === "Shukla Paksha" && month === "Ashwin"){
f.push("🔥 Dussehra")
}

if(tithi === "Purnima" && month === "Ashadha"){
f.push("🧘 Guru Purnima")
}

if(tithi === "Tritiya" && paksha === "Shukla Paksha" && month === "Vaishakha"){
f.push("🌿 Akshaya Tritiya")
}

if(tithi === "Panchami" && month === "Shravana"){
f.push("🐍 Nag Panchami")
}

if(tithi === "Ekadashi"){
f.push("🧿 Ekadashi")
}

return f
}

function calculatePanchang(){

let dateInput = document.getElementById("date").value
if(!dateInput){
alert("Please select date")
return
}

let sunriseTime = new Date(dateInput + "T06:00:00")
let sunsetTime = new Date(dateInput + "T18:30:00")

let time = Astronomy.MakeTime(sunriseTime)

// Sun longitude
let earth = Astronomy.HelioVector("Earth", time)
let sunLon = (earth.elon + 180) % 360

// Moon longitude
let moonLon = Astronomy.EclipticLongitude("Moon", time)

// fallback
if(isNaN(sunLon) || isNaN(moonLon)){
let safeTime = Astronomy.MakeTime(new Date())
let safeEarth = Astronomy.HelioVector("Earth", safeTime)
sunLon = (safeEarth.elon + 180) % 360
moonLon = Astronomy.EclipticLongitude("Moon", safeTime)
}

// Lunar month
const months = [
"Chaitra","Vaishakha","Jyeshtha","Ashadha",
"Shravana","Bhadrapada","Ashwin","Kartik",
"Margashirsha","Pausha","Magha","Phalguna"
]

let monthIndex = Math.floor(sunLon / 30) % 12
let lunarMonth = months[monthIndex]

// Tithi
let diff = (moonLon - sunLon + 360) % 360
let tithiNum = Math.floor(diff / 12) + 1
if(tithiNum > 30) tithiNum = 30
let paksha = tithiNum <= 15 ? "Shukla Paksha" : "Krishna Paksha"

// Nakshatra
let nakNum = Math.floor(moonLon / (360/27)) + 1
if(nakNum > 27) nakNum = 27

// Yoga
let yogaNum = Math.floor(((sunLon + moonLon) % 360) / (360/27)) + 1
if(yogaNum > 27) yogaNum = 27

// Names
const tithiNames = [...Array(30)].map((_,i)=>[
"Pratipada","Dwitiya","Tritiya","Chaturthi","Panchami","Shashthi",
"Saptami","Ashtami","Navami","Dashami","Ekadashi","Dwadashi",
"Trayodashi","Chaturdashi","Purnima",
"Pratipada","Dwitiya","Tritiya","Chaturthi","Panchami","Shashthi",
"Saptami","Ashtami","Navami","Dashami","Ekadashi","Dwadashi",
"Trayodashi","Chaturdashi","Amavasya"
][i])

const nakNames = ["Ashwini","Bharani","Krittika","Rohini","Mrigashira","Ardra","Punarvasu","Pushya","Ashlesha","Magha","Purva Phalguni","Uttara Phalguni","Hasta","Chitra","Swati","Vishakha","Anuradha","Jyeshtha","Mula","Purva Ashadha","Uttara Ashadha","Shravana","Dhanishta","Shatabhisha","Purva Bhadrapada","Uttara Bhadrapada","Revati"]

const yogaNames = ["Vishkumbha","Priti","Ayushman","Saubhagya","Shobhana","Atiganda","Sukarman","Dhriti","Shoola","Ganda","Vriddhi","Dhruva","Vyaghata","Harshana","Vajra","Siddhi","Vyatipata","Variyana","Parigha","Shiva","Siddha","Sadhya","Shubha","Shukla","Brahma","Indra","Vaidhriti"]

const karanaNames = ["Bava","Balava","Kaulava","Taitila","Garaja","Vanija","Vishti","Shakuni","Chatushpada","Naga","Kimstughna"]

let karanaNum = Math.floor(diff / 6) % karanaNames.length

// Safety
if(isNaN(tithiNum)) tithiNum = 1
if(isNaN(nakNum)) nakNum = 1
if(isNaN(yogaNum)) yogaNum = 1
if(isNaN(karanaNum)) karanaNum = 0

let rahu = calculateRahuKaal(sunriseTime, sunsetTime)
let muhurat = getMuhurat(tithiNum)
let choghadiya = getChoghadiya(sunriseTime, sunsetTime)

let festivals = detectFestival(
tithiNames[tithiNum-1],
paksha,
nakNames[nakNum-1],
lunarMonth
)

// Display
document.getElementById("result").innerHTML = `
<div class="card">

<h2>📅 ${dateInput}</h2>
<p>📍 Location: ${userLat.toFixed(2)}, ${userLon.toFixed(2)}</p>
<p>📅 <b>Lunar Month:</b> ${lunarMonth}</p>

${festivals.length ? `
<hr>
<h3>🎉 Festivals Today</h3>
${festivals.map(f => `<p>${f}</p>`).join("")}
` : ""}

<hr>

<p>🌅 <b>Sunrise:</b> ${sunriseTime.toLocaleTimeString()}</p>
<p>🌇 <b>Sunset:</b> ${sunsetTime.toLocaleTimeString()}</p>

<hr>

<p>🌙 <b>Tithi:</b> ${tithiNames[tithiNum-1]} (${paksha})</p>
<p>⭐ <b>Nakshatra:</b> ${nakNames[nakNum-1]}</p>
<p>🧘 <b>Yoga:</b> ${yogaNames[yogaNum-1]}</p>
<p>🔗 <b>Karana:</b> ${karanaNames[karanaNum]}</p>

<hr>

<p>☠️ <b>Rahu Kaal:</b> ${rahu.start} - ${rahu.end}</p>
<p>🪔 <b>Muhurat:</b> ${muhurat}</p>

<hr>

<h3>🕒 Day Choghadiya</h3>
${choghadiya.daySlots.map(c => `<p>${c.name}: ${c.time}</p>`).join("")}

<h3>🌙 Night Choghadiya</h3>
${choghadiya.nightSlots.map(c => `<p>${c.name}: ${c.time}</p>`).join("")}

<br>

<button onclick="window.open('https://wa.me/918708833177','_blank')">
Talk to Astrologer
</button>

</div>
`
}

</script>
