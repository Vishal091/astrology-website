
<!DOCTYPE html>
<html>
<head>
<title>Panchang 🔮 | Astrodhani</title>

<link rel="stylesheet" href="style.css">

<!-- ✅ CORRECT WORKING LIBRARY -->
<script src="https://cdn.jsdelivr.net/npm/astronomy-engine@2.1.18/astronomy.browser.min.js"></script>

<style>
.container{
max-width:800px;
margin:auto;
padding:40px 20px;
text-align:center;
}

input, button{
padding:10px;
margin:10px;
border-radius:8px;
border:none;
}

button{
background:#6C5CE7;
color:white;
cursor:pointer;
}

.card{
background:#141A40;
padding:25px;
border-radius:16px;
margin-top:20px;
box-shadow:0 0 15px rgba(108,92,231,0.4);
}
</style>
</head>

<body>

<header>
<div class="logo">🔮 Astrodhani</div>
<nav>
<a href="index.html">Home</a>
<a href="services.html">Services</a>
<a href="shop.html">Shop</a>
</nav>
</header>

<div class="container">

<h1>🔮 Panchang (Pro)</h1>
<p>Accurate Panchang based on sunrise & location</p>

<input type="date" id="date">
<button onclick="getLocation()">Get Panchang</button>

<div id="result"></div>

</div>

<script>

// Safety check
if(typeof Astronomy === "undefined"){
alert("Astronomy library failed to load ❌")
}

let userLat = 28.6139
let userLon = 77.2090

function getLocation(){

console.log("Button clicked")

if(navigator.geolocation){
navigator.geolocation.getCurrentPosition(
(pos)=>{
userLat = pos.coords.latitude
userLon = pos.coords.longitude
calculatePanchang()
},
()=>{
console.log("Using default location (Delhi)")
calculatePanchang()
}
)
}else{
calculatePanchang()
}

}

function calculatePanchang(){

let dateInput = document.getElementById("date").value

if(!dateInput){
alert("Please select date")
return
}

let date = new Date(dateInput)

// Observer
let observer = new Astronomy.Observer(userLat, userLon, 0)

// Sunrise / Sunset
let sunrise = Astronomy.SearchRiseSet("Sun", observer, +1, date, 1)
let sunset = Astronomy.SearchRiseSet("Sun", observer, -1, date, 1)

// Use sunrise time (IMPORTANT)
let calcTime = sunrise.date

// ✅ CORRECT ASTRO CALCULATION
let sunEq = Astronomy.Equator("Sun", calcTime, observer, true, true)
let moonEq = Astronomy.Equator("Moon", calcTime, observer, true, true)

let sunEcl = Astronomy.Ecliptic(sunEq)
let moonEcl = Astronomy.Ecliptic(moonEq)

let sunLon = sunEcl.elon
let moonLon = moonEcl.elon

// Tithi
let diff = (moonLon - sunLon + 360) % 360
let tithiNum = Math.floor(diff / 12) + 1
let paksha = tithiNum <= 15 ? "Shukla Paksha" : "Krishna Paksha"

// Nakshatra
let nakNum = Math.floor(moonLon / (360/27)) + 1

// Yoga
let yogaNum = Math.floor((sunLon + moonLon) % 360 / (360/27)) + 1

// Karana
let karanaNum = Math.floor(diff / 6) + 1

// Names
const tithiNames = [
"Pratipada","Dwitiya","Tritiya","Chaturthi","Panchami","Shashthi",
"Saptami","Ashtami","Navami","Dashami","Ekadashi","Dwadashi",
"Trayodashi","Chaturdashi","Purnima",
"Pratipada","Dwitiya","Tritiya","Chaturthi","Panchami","Shashthi",
"Saptami","Ashtami","Navami","Dashami","Ekadashi","Dwadashi",
"Trayodashi","Chaturdashi","Amavasya"
]

const nakNames = [
"Ashwini","Bharani","Krittika","Rohini","Mrigashira","Ardra",
"Punarvasu","Pushya","Ashlesha","Magha","Purva Phalguni","Uttara Phalguni",
"Hasta","Chitra","Swati","Vishakha","Anuradha","Jyeshtha",
"Mula","Purva Ashadha","Uttara Ashadha","Shravana","Dhanishta",
"Shatabhisha","Purva Bhadrapada","Uttara Bhadrapada","Revati"
]

const yogaNames = [
"Vishkumbha","Priti","Ayushman","Saubhagya","Shobhana","Atiganda",
"Sukarman","Dhriti","Shoola","Ganda","Vriddhi","Dhruva",
"Vyaghata","Harshana","Vajra","Siddhi","Vyatipata","Variyana",
"Parigha","Shiva","Siddha","Sadhya","Shubha","Shukla",
"Brahma","Indra","Vaidhriti"
]

const karanaNames = [
"Bava","Balava","Kaulava","Taitila","Garaja","Vanija","Vishti",
"Bava","Balava","Kaulava","Taitila","Garaja","Vanija","Vishti",
"Bava","Balava","Kaulava","Taitila","Garaja","Vanija","Vishti",
"Bava","Balava","Kaulava","Taitila","Garaja","Vanija","Vishti",
"Shakuni","Chatushpada","Naga","Kimstughna"
]

// Format time
function formatTime(t){
return new Date(t.date).toLocaleTimeString()
}

// Display
document.getElementById("result").innerHTML = `
<div class="card">

<h2>📅 ${dateInput}</h2>
<p>📍 Location: ${userLat.toFixed(2)}, ${userLon.toFixed(2)}</p>

<p>🌅 <b>Sunrise:</b> ${formatTime(sunrise)}</p>
<p>🌇 <b>Sunset:</b> ${formatTime(sunset)}</p>

<hr>

<p>🌙 <b>Tithi:</b> ${tithiNames[tithiNum-1]} (${paksha})</p>
<p>⭐ <b>Nakshatra:</b> ${nakNames[nakNum-1]}</p>
<p>🧘 <b>Yoga:</b> ${yogaNames[yogaNum-1]}</p>
<p>🔗 <b>Karana:</b> ${karanaNames[karanaNum-1]}</p>

<br>

<button onclick="window.open('https://wa.me/91XXXXXXXXXX','_blank')">
Talk to Astrologer
</button>

</div>
`

}

</script>

</body>
</html>
