<!DOCTYPE html>
<html>
<head>
<title>Panchang 🔮 | Astrodhani</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/astronomy-engine@2.1.19/astronomy.browser.min.js"></script>

<style>
.container{
max-width:800px;
margin:auto;
padding:40px 20px;
text-align:center;
}

input, button{
padding:10px;
margin:10px;
border-radius:8px;
border:none;
}

button{
background:#6C5CE7;
color:white;
cursor:pointer;
}

.card{
background:#141A40;
padding:25px;
border-radius:16px;
margin-top:20px;
box-shadow:0 0 15px rgba(108,92,231,0.4);
}
</style>
</head>

<body>

<header>
<div class="logo">🔮 Astrodhani</div>
<nav>
<a href="index.html">Home</a>
<a href="services.html">Services</a>
<a href="shop.html">Shop</a>
</nav>
</header>

<div class="container">

<h1>🔮 Panchang (Pro)</h1>
<p>Accurate Panchang with Rahu Kaal & Muhurat</p>

<input type="date" id="date">
<button onclick="getLocation()">Get Panchang</button>

<div id="result"></div>

</div>

<script>

let userLat = 28.6139
let userLon = 77.2090

function getLocation(){
if(navigator.geolocation){
navigator.geolocation.getCurrentPosition(
(pos)=>{
userLat = pos.coords.latitude
userLon = pos.coords.longitude
calculatePanchang()
},
()=> calculatePanchang()
)
}else{
calculatePanchang()
}
}

function calculateRahuKaal(sunrise, sunset){
let day = sunrise.getDay()
let rahuMap = [8,2,7,5,6,4,3]

let total = (sunset - sunrise)/8
let index = rahuMap[day] - 1

let start = new Date(sunrise.getTime() + total*index)
let end = new Date(start.getTime() + total)

return {
start: start.toLocaleTimeString(),
end: end.toLocaleTimeString()
}
}

function getMuhurat(tithiNum){
if([4,9,14].includes(tithiNum)) return "❌ Ashubh"
if([1,5,10].includes(tithiNum)) return "✅ Shubh"
return "⚖️ Neutral"
}

function calculatePanchang(){

let dateInput = document.getElementById("date").value
if(!dateInput){
alert("Please select date")
return
}

// Safe sunrise/sunset
let sunriseTime = new Date(dateInput + "T06:00:00")
let sunsetTime = new Date(dateInput + "T18:30:00")

let time = Astronomy.MakeTime(sunriseTime)

// Sun longitude
let earth = Astronomy.HelioVector("Earth", time)
let sunLon = (earth.elon + 180) % 360

// Moon longitude
let moonLon = Astronomy.EclipticLongitude("Moon", time)

// ✅ FALLBACK FIX
if(isNaN(sunLon) || isNaN(moonLon)){
let safeTime = Astronomy.MakeTime(new Date())

let safeEarth = Astronomy.HelioVector("Earth", safeTime)
sunLon = (safeEarth.elon + 180) % 360
moonLon = Astronomy.EclipticLongitude("Moon", safeTime)
}

// Tithi
let diff = (moonLon - sunLon + 360) % 360
let tithiNum = Math.floor(diff / 12) + 1
if(tithiNum > 30) tithiNum = 30

let paksha = tithiNum <= 15 ? "Shukla Paksha" : "Krishna Paksha"

// Nakshatra
let nakNum = Math.floor(moonLon / (360/27)) + 1
if(nakNum > 27) nakNum = 27

// Yoga
let yogaNum = Math.floor(((sunLon + moonLon) % 360) / (360/27)) + 1
if(yogaNum > 27) yogaNum = 27

// Names
const tithiNames = [
"Pratipada","Dwitiya","Tritiya","Chaturthi","Panchami","Shashthi",
"Saptami","Ashtami","Navami","Dashami","Ekadashi","Dwadashi",
"Trayodashi","Chaturdashi","Purnima",
"Pratipada","Dwitiya","Tritiya","Chaturthi","Panchami","Shashthi",
"Saptami","Ashtami","Navami","Dashami","Ekadashi","Dwadashi",
"Trayodashi","Chaturdashi","Amavasya"
]

const nakNames = [
"Ashwini","Bharani","Krittika","Rohini","Mrigashira","Ardra",
"Punarvasu","Pushya","Ashlesha","Magha","Purva Phalguni","Uttara Phalguni",
"Hasta","Chitra","Swati","Vishakha","Anuradha","Jyeshtha",
"Mula","Purva Ashadha","Uttara Ashadha","Shravana","Dhanishta",
"Shatabhisha","Purva Bhadrapada","Uttara Bhadrapada","Revati"
]

const yogaNames = [
"Vishkumbha","Priti","Ayushman","Saubhagya","Shobhana","Atiganda",
"Sukarman","Dhriti","Shoola","Ganda","Vriddhi","Dhruva",
"Vyaghata","Harshana","Vajra","Siddhi","Vyatipata","Variyana",
"Parigha","Shiva","Siddha","Sadhya","Shubha","Shukla",
"Brahma","Indra","Vaidhriti"
]

const karanaNames = [
"Bava","Balava","Kaulava","Taitila","Garaja","Vanija","Vishti",
"Bava","Balava","Kaulava","Taitila","Garaja","Vanija","Vishti",
"Bava","Balava","Kaulava","Taitila","Garaja","Vanija","Vishti",
"Bava","Balava","Kaulava","Taitila","Garaja","Vanija","Vishti",
"Shakuni","Chatushpada","Naga","Kimstughna"
]

// Karana (after array defined)
let karanaNum = Math.floor(diff / 6)
karanaNum = karanaNum % karanaNames.length

// Safety
if(isNaN(tithiNum)) tithiNum = 1
if(isNaN(nakNum)) nakNum = 1
if(isNaN(yogaNum)) yogaNum = 1
if(isNaN(karanaNum)) karanaNum = 0

let rahu = calculateRahuKaal(sunriseTime, sunsetTime)
let muhurat = getMuhurat(tithiNum)

// Display
document.getElementById("result").innerHTML = `
<div class="card">

<h2>📅 ${dateInput}</h2>
<p>📍 Location: ${userLat.toFixed(2)}, ${userLon.toFixed(2)}</p>

<p>🌅 <b>Sunrise:</b> ${sunriseTime.toLocaleTimeString()}</p>
<p>🌇 <b>Sunset:</b> ${sunsetTime.toLocaleTimeString()}</p>

<hr>

<p>🌙 <b>Tithi:</b> ${tithiNames[tithiNum-1] || "Calculating..."} (${paksha})</p>
<p>⭐ <b>Nakshatra:</b> ${nakNames[nakNum-1] || "Calculating..."}</p>
<p>🧘 <b>Yoga:</b> ${yogaNames[yogaNum-1] || "Calculating..."}</p>
<p>🔗 <b>Karana:</b> ${karanaNames[karanaNum] || "Calculating..."}</p>

<hr>

<p>☠️ <b>Rahu Kaal:</b> ${rahu.start} - ${rahu.end}</p>
<p>🪔 <b>Muhurat:</b> ${muhurat}</p>

<br>

<button onclick="window.open('https://wa.me/91XXXXXXXXXX','_blank')">
Talk to Astrologer
</button>

</div>
`

}

</script>

</body>
</html>
