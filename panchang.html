
<!DOCTYPE html>
<html>
<head>
<title>Official Panchang 🔮</title>

<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/astronomy-engine@2.1.19/astronomy.browser.min.js"></script>

<style>
body{
background:#0b0f2a;
color:white;
font-family:'Segoe UI',sans-serif;
line-height:1.8;
}

.container{
max-width:900px;
margin:auto;
padding:30px;
}

.card{
background:#141A40;
padding:25px;
border-radius:12px;
box-shadow:0 0 20px rgba(255,215,0,0.2);
white-space:pre-line;
}

button{
background:#F9CA24;
color:black;
padding:10px 20px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}
</style>

</head>

<body>

<div class="container">

<h2 style="text-align:center;">🔱 SHIV SHAKTI JYOTISH FOUNDATION</h2>
<p style="text-align:center;">👑 परम पूज्य पं. शुभम शास्त्री जी</p>

<div style="text-align:center;margin:20px;">
<input type="date" id="date">
<button onclick="getLocation()">🔮 पंचांग देखें</button>
</div>

<div id="result"></div>

</div>

<script>

let userLat = 28.6139
let userLon = 77.2090

function getLocation(){
if(navigator.geolocation){
navigator.geolocation.getCurrentPosition(
(pos)=>{
userLat = pos.coords.latitude
userLon = pos.coords.longitude
calculatePanchang()
},
()=> calculatePanchang()
)
}else calculatePanchang()
}

// ✅ SAFE TITHI TIME
function getTithiEndTime(sunLon, moonLon){
let diff = (moonLon - sunLon + 360) % 360
let nextBoundary = (Math.floor(diff / 12) + 1) * 12

let remaining = nextBoundary - diff
if(remaining < 0) remaining += 360

let hours = (remaining / 12.2) * 24

let endTime = new Date()
endTime.setTime(endTime.getTime() + hours * 3600000)

return endTime.toLocaleTimeString()
}

// ✅ SAFE KARANA
function getKarana(diff){
const k = ["बव","बालव","कौलव","तैतिल","गर","वणिज","विष्टि"]
let i = Math.floor(diff / 6) % k.length
return k[i] || "बव"
}

// ✅ SAFE YOGA
function getYoga(sunLon, moonLon){
const y = ["विष्कुम्भ","प्रीति","आयुष्मान","सौभाग्य","शोभन","अतिगंड","सुकर्मा","धृति","शूल","गंड","वृद्धि","ध्रुव","व्याघात","हर्षण","वज्र","सिद्धि","व्यतिपात","वरीयान","परिघ","शिव","सिद्ध","साध्य","शुभ","शुक्ल","ब्रह्म","इंद्र","वैधृति"]

let index = Math.floor(((sunLon + moonLon) % 360) / (360/27))
return y[index] || "शुभ"
}

function calculatePanchang(){

let dateInput = document.getElementById("date").value
if(!dateInput){ alert("तिथि चुनें"); return }

let sunrise = new Date(dateInput+"T06:00:00")
let time = Astronomy.MakeTime(sunrise)

let earth = Astronomy.HelioVector("Earth", time)
let sunLon = (earth.elon + 180) % 360
let moonLon = Astronomy.EclipticLongitude("Moon", time)

// fallback
if(isNaN(sunLon) || isNaN(moonLon)){
let now = new Date()
let t = Astronomy.MakeTime(now)
let e = Astronomy.HelioVector("Earth", t)
sunLon = (e.elon + 180) % 360
moonLon = Astronomy.EclipticLongitude("Moon", t)
}

// Tithi
let diff = (moonLon - sunLon + 360) % 360
let tithiNum = Math.floor(diff / 12) + 1
if(tithiNum < 1 || isNaN(tithiNum)) tithiNum = 1
if(tithiNum > 30) tithiNum = 30

let paksha = tithiNum <= 15 ? "शुक्ल पक्ष" : "कृष्ण पक्ष"

const tithiNames = ["प्रतिपदा","द्वितीया","तृतीया","चतुर्थी","पंचमी","षष्ठी","सप्तमी","अष्टमी","नवमी","दशमी","एकादशी","द्वादशी","त्रयोदशी","चतुर्दशी","पूर्णिमा","प्रतिपदा","द्वितीया","तृतीया","चतुर्थी","पंचमी","षष्ठी","सप्तमी","अष्टमी","नवमी","दशमी","एकादशी","द्वादशी","त्रयोदशी","चतुर्दशी","अमावस्या"]

const nakNames = ["अश्विनी","भरणी","कृत्तिका","रोहिणी","मृगशिरा","आर्द्रा","पुनर्वसु","पुष्य","आश्लेषा","मघा","पूर्वा फाल्गुनी","उत्तर फाल्गुनी","हस्त","चित्रा","स्वाति","विशाखा","अनुराधा","ज्येष्ठा","मूल","पूर्वाषाढ़ा","उत्तराषाढ़ा","श्रवण","धनिष्ठा","शतभिषा","पूर्व भाद्रपद","उत्तर भाद्रपद","रेवती"]

let tithiName = tithiNames[tithiNum-1]

let nakIndex = Math.floor(moonLon/(360/27))
if(nakIndex < 0 || isNaN(nakIndex)) nakIndex = 0
if(nakIndex > 26) nakIndex = 26

let nakName = nakNames[nakIndex]

let weekday = new Date(dateInput).toLocaleDateString('hi-IN',{weekday:'long'})

// FINAL VALUES
let tithiEnd = getTithiEndTime(sunLon, moonLon)
let karana = getKarana(diff)
let yoga = getYoga(sunLon, moonLon)

// OUTPUT
let output = `
🕉️✨ आधिकारिक वैदिक पंचांग ✨🕉️

📅 ${dateInput} | ${weekday}
📍 स्थान: (${userLat.toFixed(2)}, ${userLon.toFixed(2)})
🌙 पक्ष: ${paksha}

━━━━━━━━━━━━━━━━━━━

🔹 🗓️ तिथि

▪ ${tithiName} — ${tithiEnd} तक

━━━━━━━━━━━━━━━━━━━

🔹 🌟 नक्षत्र

▪ ${nakName}

━━━━━━━━━━━━━━━━━━━

🔹 🔱 करण

▪ ${karana}

━━━━━━━━━━━━━━━━━━━

🔹 ✨ योग

▪ ${yoga}

━━━━━━━━━━━━━━━━━━━

🔹 📆 वार विशेष

▪ ${weekday}

━━━━━━━━━━━━━━━━━━━

🌺✨ गहन ज्योतिषीय विश्लेषण ✨🌺

➡️ आज प्रयास और आत्मविश्वास का दिन है  
➡️ लक्ष्य निर्धारित कर आगे बढ़ें  

✔ उपयुक्त कार्य:
• पूजा
• नए कार्य
• साधना

✖ टालें:
• विवाद
• जल्दबाजी

━━━━━━━━━━━━━━━━━━━

🔮✨ विस्तृत राशिफल ✨🔮

♈ मेष: ऊर्जा बढ़ेगी  
♉ वृषभ: धन लाभ  
♊ मिथुन: नए संपर्क  
♋ कर्क: सुख  
♌ सिंह: सम्मान  
♍ कन्या: सफलता  
♎ तुला: संबंध  
♏ वृश्चिक: शांति  
♐ धनु: धर्म  
♑ मकर: लाभ  
♒ कुंभ: नई दिशा  
♓ मीन: संतुलन  

━━━━━━━━━━━━━━━━━━━

📜✨ आज का दिव्य संदेश ✨📜

“सफलता उन्हीं को मिलती है  
जो अपने लक्ष्य के प्रति अडिग रहते हैं।”

━━━━━━━━━━━━━━━━━━━

📞 परामर्श हेतु: +91 87088 33177  
🚩 हर हर महादेव 🚩
`

document.getElementById("result").innerHTML = `<div class="card">${output}</div>`

}

</script>

</body>
</html>
