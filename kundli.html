<!DOCTYPE html>
<html>

<head>
<title>Astrodhani - Free Kundli</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<div class="logo">🔮 Astrodhani</div>

<nav>
<a href="index.html">Home</a>
<a href="astrologers.html">Astrologers</a>
<a href="horoscope.html">Horoscope</a>
<a href="kundli.html">Free Kundli</a>
</nav>

<div class="wallet">
₹<span id="wallet">500</span>
</div>
</header>

<div class="container">

<div class="formbox">

<h2>Free AI Kundli Generator 🔮</h2>

<input id="name" placeholder="Your Name">

<input id="dob" type="date">

<input id="time" type="time">

<input id="place" placeholder="Birth Place">

<button onclick="generateKundli()">Generate Kundli</button>

<div id="result"></div>

</div>

</div>

<style>

body{
background:#0B0F2A;
color:white;
font-family:Arial;
}

.container{
padding:40px;
}

.formbox{
max-width:500px;
margin:auto;
background:#141A40;
padding:30px;
border-radius:12px;
}

.formbox input{
width:100%;
padding:10px;
margin:10px 0;
border-radius:6px;
border:none;
}

.formbox button{
width:100%;
padding:12px;
background:#6C5CE7;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

#result{
margin-top:20px;
}

.kundli-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
margin-top:20px;
}

.kundli-card{
background:#141A40;
padding:20px;
border-radius:12px;
color:white;
box-shadow:0 0 15px rgba(108,92,231,0.4);
}

.kundli-card h3{
margin-bottom:10px;
color:#F9CA24;
}

</style>

<script>

async function generateKundli(){

console.log("clicked")

let name = document.getElementById("name").value
let dob = document.getElementById("dob").value
let time = document.getElementById("time").value
let place = document.getElementById("place").value

if(!name || !dob){
alert("Please fill required details")
return
}

document.getElementById("result").innerHTML =
"<p>Generating your kundli...</p>"

try{

let res = await fetch("/api/ai",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body: JSON.stringify({
question:
"Generate a Vedic astrology birth chart.\n" +
"Name: " + name + "\n" +
"DOB: " + dob + "\n" +
"Time: " + time + "\n" +
"Place: " + place + "\n\n" +
"Respond ONLY in this format:\n" +
"ZODIAC: ...\n" +
"PERSONALITY: ...\n" +
"CAREER: ...\n" +
"LOVE: ..."
})
})

let data = await res.json()

console.log(data)

if(!data.answer){
document.getElementById("result").innerHTML =
"<p>AI not responding</p>"
return
}

let text = data.answer

function extract(label){
let regex = new RegExp(label + ":(.*)", "i")
let match = text.match(regex)
return match ? match[1].trim() : "Not available"
}

let zodiac = extract("ZODIAC")
let personality = extract("PERSONALITY")
let career = extract("CAREER")
let love = extract("LOVE")

document.getElementById("result").innerHTML =
"<div class='kundli-grid'>" +

"<div class='kundli-card'><h3>🔥 Zodiac</h3><p>"+zodiac+"</p></div>" +

"<div class='kundli-card'><h3>🧠 Personality</h3><p>"+personality+"</p></div>" +

"<div class='kundli-card'><h3>💼 Career</h3><p>"+career+"</p></div>" +

"<div class='kundli-card'><h3>❤️ Love</h3><p>"+love+"</p></div>" +

"</div>"

}catch(err){

console.log(err)

document.getElementById("result").innerHTML =
"<p>Error generating kundli</p>"

}

}

</script>

</body>
</html>
