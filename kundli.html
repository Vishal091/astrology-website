<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Astrodhani Kundli 🔮</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body { margin:0; font-family:Arial; background:#0b0f1a; color:white; text-align:center; }
    h1 { color:gold; margin-top:20px; }

    .container { max-width:600px; margin:auto; padding:20px; }

    input,button {
      width:100%; padding:12px; margin:8px 0;
      border-radius:10px; border:none;
    }

    input { background:#111827; color:white; }

    button {
      background:gold;
      color:black;
      font-weight:bold;
      cursor:pointer;
    }

    .result {
      margin-top:20px;
      background:#111827;
      padding:15px;
      border-radius:10px;
      text-align:left;
      overflow-x:auto;
    }

    table {
      width:100%;
      border-collapse:collapse;
      margin-top:10px;
      font-size:12px;
    }

    th, td {
      border:1px solid #333;
      padding:6px;
      text-align:center;
    }

    th { background:#1f2937; }

    #suggestions {
      position:absolute;
      width:calc(100% - 40px);
      background:#111827;
      border-radius:8px;
      max-height:150px;
      overflow-y:auto;
      text-align:left;
      z-index:10;
    }

    .suggestion-item {
      padding:10px;
      cursor:pointer;
    }

    .suggestion-item:hover {
      background:#1f2937;
    }
  </style>
</head>

<body>

<h1>🔮 Astrodhani Kundli</h1>

<div class="container">

  <input type="text" id="name" placeholder="Enter Name">

  <div style="position:relative;">
    <input type="text" id="place" placeholder="Place of Birth">
    <div id="suggestions"></div>
  </div>

  <input type="date" id="dob">
  <input type="time" id="tob">

  <button onclick="generateKundli()">Generate Kundli</button>

  <div id="output" class="result"></div>

</div>

<script type="module">
import ModuleFactory from "/swisseph.js";

let Module = null;
let sweReady = false;

ModuleFactory({
  locateFile: (file) => file.endsWith(".wasm") ? "/swisseph.wasm" : file
}).then((mod) => {
  Module = mod;
  Module.ccall("swe_set_ephe_path", null, ["string"], ["/ephe"]);
  Module.ccall("swe_set_sid_mode", null, ["number","number","number"], [1,0,0]);
  sweReady = true;
});

// ---------------- AUTOCOMPLETE ----------------
const placeInput = document.getElementById("place");
const suggestionsBox = document.getElementById("suggestions");

placeInput.addEventListener("input", async function () {
  const q = this.value;
  if (q.length < 3) return suggestionsBox.innerHTML = "";

  const res = await fetch(`https://photon.komoot.io/api/?q=${q}&limit=5`);
  const data = await res.json();

  suggestionsBox.innerHTML = "";

  data.features.forEach(p => {
    const full = `${p.properties.name || ""}, ${p.properties.city || ""}, ${p.properties.country || ""}`;
    const div = document.createElement("div");
    div.className = "suggestion-item";
    div.innerText = full;

    div.onclick = () => {
      placeInput.value = full;
      suggestionsBox.innerHTML = "";
      window.selectedLat = p.geometry.coordinates[1];
      window.selectedLon = p.geometry.coordinates[0];
    };

    suggestionsBox.appendChild(div);
  });
});

// ---------------- FALLBACK ----------------
async function getLatLon(place) {
  const API_KEY = "4110c45bd1ac444fa32a18f0799d0cb3";
  const res = await fetch(`https://api.opencagedata.com/geocode/v1/json?q=${place}&key=${API_KEY}`);
  const data = await res.json();
  if (!data.results.length) throw new Error("Location not found");

  return {
    lat: data.results[0].geometry.lat,
    lon: data.results[0].geometry.lng
  };
}

// ---------------- UTILS ----------------
function getJulianDay(date) {
  return (date / 86400000) + 2440587.5;
}

function getPlanetLongitude(jd, planet) {
  const ptr = Module._malloc(8 * 6);

  Module.ccall("swe_calc_ut", null,
    ["number","number","number","number"],
    [jd, planet, 65536, ptr]
  );

  const lon = Module.HEAPF64[ptr / 8];
  Module._free(ptr);

  return (lon + 360) % 360;
}

// ---------------- BASIC MAPS ----------------
const rashis = ["Aries","Taurus","Gemini","Cancer","Leo","Virgo","Libra","Scorpio","Sagittarius","Capricorn","Aquarius","Pisces"];
const signLords = {
  Aries:"Mars", Taurus:"Venus", Gemini:"Mercury", Cancer:"Moon",
  Leo:"Sun", Virgo:"Mercury", Libra:"Venus", Scorpio:"Mars",
  Sagittarius:"Jupiter", Capricorn:"Saturn", Aquarius:"Saturn", Pisces:"Jupiter"
};

const nakshatras = [
"Ashwini","Bharani","Krittika","Rohini","Mrigashira","Ardra","Punarvasu","Pushya","Ashlesha",
"Magha","Purva Phalguni","Uttara Phalguni","Hasta","Chitra","Swati","Vishakha","Anuradha","Jyeshtha",
"Mula","Purva Ashadha","Uttara Ashadha","Shravana","Dhanishta","Shatabhisha",
"Purva Bhadrapada","Uttara Bhadrapada","Revati"
];

const nakshatraLords = [
"Ketu","Venus","Sun","Moon","Mars","Rahu","Jupiter","Saturn","Mercury",
"Ketu","Venus","Sun","Moon","Mars","Rahu","Jupiter","Saturn","Mercury",
"Ketu","Venus","Sun","Moon","Mars","Rahu","Jupiter","Saturn","Mercury"
];

function getRashi(d){ return rashis[Math.floor(d/30)]; }

function getNakshatraDetails(m){
  const seg=360/27;
  let i=Math.floor(m/seg);
  i=Math.max(0,Math.min(26,i));
  const pada=Math.floor((m%seg)/(seg/4))+1;
  return {name:nakshatras[i],pada,index:i};
}

function formatDegree(d){
  const deg=Math.floor(d);
  const min=Math.floor((d-deg)*60);
  const sec=Math.floor(((d-deg)*60-min)*60);
  return `${deg}°${min}′${sec}″`;
}

// ---------------- PANCHANG ----------------
function calculatePanchang(sun,moon){
  let diff=moon-sun; if(diff<0) diff+=360;

  const tithiIndex=Math.floor(diff/12);
  const paksha=tithiIndex<15?"Shukla":"Krishna";

  const tithiNames=["Pratipada","Dwitiya","Tritiya","Chaturthi","Panchami","Shashthi","Saptami","Ashtami","Navami","Dashami","Ekadashi","Dwadashi","Trayodashi","Chaturdashi","Purnima","Pratipada","Dwitiya","Tritiya","Chaturthi","Panchami","Shashthi","Saptami","Ashtami","Navami","Dashami","Ekadashi","Dwadashi","Trayodashi","Chaturdashi","Amavasya"];

  return { tithi:`${paksha} ${tithiNames[tithiIndex]}` };
}

// ---------------- LAGNA + HOUSES ----------------
function getAscendant(jd,lat,lon){
  const p1=Module._malloc(8*13);
  const p2=Module._malloc(8*10);

  Module.ccall("swe_houses_ex",null,
    ["number","number","number","number","number","number","number"],
    [jd,65536,lat,lon,80,p1,p2]
  );

  const asc=Module.HEAPF64[p2/8];
  Module._free(p1); Module._free(p2);

  return (asc+360)%360;
}

function getHouses(lagna){
  let h=[];
  for(let i=0;i<12;i++) h.push((lagna+i*30)%360);
  return h;
}

function getHouseOfPlanet(p,c){
  for(let i=0;i<12;i++){
    let s=c[i],e=c[(i+1)%12];
    if(e<s) e+=360;
    if(p<s) p+=360;
    if(p>=s&&p<e) return i+1;
  }
  return 1;
}

// ---------------- MAIN ----------------
window.generateKundli = async function(){

if(!sweReady) return alert("Engine loading...");

const name=document.getElementById("name").value||"User";
const place=document.getElementById("place").value;
const dob=document.getElementById("dob").value;
const tob=document.getElementById("tob").value;

let lat=window.selectedLat, lon=window.selectedLon;
if(!lat||!lon){ const r=await getLatLon(place); lat=r.lat; lon=r.lon; }

// IST → UTC
const local=new Date(dob+"T"+tob);
const utc=new Date(local.getTime()-19800000);
const jd=getJulianDay(utc);

// Planets
const planetMap={Sun:0,Moon:1,Mars:4,Mercury:2,Jupiter:5,Venus:3,Saturn:6};

const lagna=getAscendant(jd,lat,lon);
const houses=getHouses(lagna);

let rows="";

for(let p in planetMap){

  const deg=getPlanetLongitude(jd,planetMap[p]);
  const rashi=getRashi(deg);
  const nak=getNakshatraDetails(deg);
  const house=getHouseOfPlanet(deg,houses);

  rows+=`
  <tr>
    <td>${p}</td>
    <td>${rashi}</td>
    <td>${signLords[rashi]}</td>
    <td>${nak.name}</td>
    <td>${nakshatraLords[nak.index]}</td>
    <td>${formatDegree(deg)}</td>
    <td>Direct</td>
    <td>No</td>
    <td>--</td>
    <td>${house}</td>
    <td>Normal</td>
  </tr>`;
}

document.getElementById("output").innerHTML=`
<h3>${name}'s Kundli</h3>

<table>
<tr>
<th>Planet</th><th>Sign</th><th>Sign Lord</th>
<th>Nakshatra</th><th>Naksh Lord</th>
<th>Degree</th><th>Retro</th><th>Combust</th>
<th>Avastha</th><th>House</th><th>Status</th>
</tr>
${rows}
</table>
`;
}
</script>

</body>
</html>
