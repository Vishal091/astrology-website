
<!DOCTYPE html>
<html>

<head>
<title>Astrodhani - Free Kundli</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>

<body>

<header>
<div class="logo">🔮 Astrodhani</div>

<nav>
<a href="index.html">Home</a>
<a href="astrologers.html">Astrologers</a>
<a href="horoscope.html">Horoscope</a>
<a href="kundli.html">Free Kundli</a>
</nav>

<div class="wallet">₹<span id="wallet">500</span></div>
</header>

<div class="container">

<div class="formbox">

<h2>Free AI Kundli Generator 🔮</h2>

<input id="name" placeholder="Your Name">
<input id="dob" type="date">
<input id="time" type="time">
<input id="place" placeholder="Birth Place">

<button onclick="generateKundli()">Generate Kundli</button>

<div id="result"></div>

<button onclick="downloadPDF()">Download Kundli PDF</button>

</div>

</div>

<style>

body{
background:#0B0F2A;
color:white;
font-family:Arial;
}

.container{padding:40px;}

.formbox{
max-width:500px;
margin:auto;
background:#141A40;
padding:30px;
border-radius:12px;
}

.formbox input{
width:100%;
padding:10px;
margin:10px 0;
border-radius:6px;
border:none;
}

.formbox button{
width:100%;
padding:12px;
margin-top:10px;
background:#6C5CE7;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

.kundli-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
margin-top:20px;
}

.kundli-card{
background:#141A40;
padding:20px;
border-radius:12px;
color:white;
box-shadow:0 0 15px rgba(108,92,231,0.4);
}

.kundli-card h3{
color:#F9CA24;
margin-bottom:10px;
}

.zodiac{border-left:4px solid #f39c12;}
.personality{border-left:4px solid #6c5ce7;}
.career{border-left:4px solid #00cec9;}
.love{border-left:4px solid #e84393;}

</style>

<script>

let lastKundli = {}

function getZodiac(date){

let d = new Date(date)
let day = d.getDate()
let month = d.getMonth()+1

if((month==3 && day>=21)||(month==4 && day<=19)) return "Aries"
if((month==4 && day>=20)||(month==5 && day<=20)) return "Taurus"
if((month==5 && day>=21)||(month==6 && day<=20)) return "Gemini"
if((month==6 && day>=21)||(month==7 && day<=22)) return "Cancer"
if((month==7 && day>=23)||(month==8 && day<=22)) return "Leo"
if((month==8 && day>=23)||(month==9 && day<=22)) return "Virgo"
if((month==9 && day>=23)||(month==10 && day<=22)) return "Libra"
if((month==10 && day>=23)||(month==11 && day<=21)) return "Scorpio"
if((month==11 && day>=22)||(month==12 && day<=21)) return "Sagittarius"
if((month==12 && day>=22)||(month==1 && day<=19)) return "Capricorn"
if((month==1 && day>=20)||(month==2 && day<=18)) return "Aquarius"
if((month==2 && day>=19)||(month==3 && day<=20)) return "Pisces"

return "Unknown"
}

async function generateKundli(){

let name = document.getElementById("name").value
let dob = document.getElementById("dob").value
let time = document.getElementById("time").value
let place = document.getElementById("place").value

if(!name || !dob){
alert("Fill required fields")
return
}

let zodiacReal = getZodiac(dob)

document.getElementById("result").innerHTML = "Generating..."

let res = await fetch("/api/ai",{
method:"POST",
headers:{ "Content-Type":"application/json" },
body: JSON.stringify({
question:
"Act as Vedic astrologer.\nZodiac: "+zodiacReal+"\n\n"+
"Respond EXACTLY:\nPERSONALITY: ...\nCAREER: ...\nLOVE: ..."
})
})

let data = await res.json()

let text = data.answer

function extract(label){
let regex = new RegExp(label+":(.*?)(?=\\n[A-Z]+:|$)","is")
let match = text.match(regex)
return match ? match[1].trim() : "Not available"
}

let personality = extract("PERSONALITY")
let career = extract("CAREER")
let love = extract("LOVE")

// mock planets
let planets = ["Sun - Aries","Moon - Taurus","Mars - Gemini","Venus - Leo"]

// mock houses
let houses = ["1st House - Personality","7th House - Marriage","10th House - Career"]

document.getElementById("result").innerHTML =

"<div class='kundli-grid'>" +

"<div class='kundli-card zodiac'><h3>🔥 Basic Details</h3>"+
"<p>Name: "+name+"</p>"+
"<p>Zodiac: "+zodiacReal+"</p>"+
"<p>DOB: "+dob+"</p>"+
"<p>Place: "+place+"</p></div>"+

"<div class='kundli-card'><h3>🪐 Planetary Positions</h3>"+
planets.map(p=>"<p>"+p+"</p>").join("")+"</div>"+

"<div class='kundli-card'><h3>🏠 Houses</h3>"+
houses.map(h=>"<p>"+h+"</p>").join("")+"</div>"+

"<div class='kundli-card personality'><h3>🧠 Personality</h3><p>"+personality+"</p></div>"+

"<div class='kundli-card career'><h3>💼 Career</h3><p>"+career+"</p></div>"+

"<div class='kundli-card love'><h3>❤️ Love</h3><p>"+love+"</p></div>"+

"</div>"

// save for PDF
lastKundli = { name, zodiacReal, personality, career, love }

}

function downloadPDF(){

if(!lastKundli.name){
alert("Generate kundli first")
return
}

const { jsPDF } = window.jspdf
const doc = new jsPDF()

doc.text("Astrodhani Kundli Report",20,20)
doc.text("Name: "+lastKundli.name,20,40)
doc.text("Zodiac: "+lastKundli.zodiacReal,20,50)

doc.text("Personality:",20,70)
doc.text(lastKundli.personality,20,80,{maxWidth:170})

doc.text("Career:",20,110)
doc.text(lastKundli.career,20,120,{maxWidth:170})

doc.text("Love:",20,150)
doc.text(lastKundli.love,20,160,{maxWidth:170})

doc.save("kundli.pdf")

}

</script>

</body>
</html>
