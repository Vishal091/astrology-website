<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Astrodhani Kundli 🔮</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body { margin:0; font-family:Arial; background:#0b0f1a; color:white; text-align:center; }
    h1 { color:gold; margin-top:20px; }
    .container { max-width:500px; margin:auto; padding:20px; }

    input,button {
      width:100%; padding:12px; margin:8px 0;
      border-radius:10px; border:none;
    }

    input { background:#111827; color:white; }
    button { background:gold; color:black; font-weight:bold; cursor:pointer; }

    .result {
      margin-top:20px;
      background:#111827;
      padding:15px;
      border-radius:10px;
      text-align:left;
    }

    .highlight { color:gold; font-weight:bold; }

    #suggestions {
      position:absolute;
      width:calc(100% - 40px);
      background:#111827;
      border-radius:8px;
      max-height:150px;
      overflow-y:auto;
      text-align:left;
      z-index:10;
    }

    .suggestion-item { padding:10px; cursor:pointer; }
    .suggestion-item:hover { background:#1f2937; }
  </style>
</head>

<body>

<h1>🔮 Astrodhani Kundli</h1>

<div class="container">

  <input type="text" id="name" placeholder="Enter Name">

  <div style="position:relative;">
    <input type="text" id="place" placeholder="Place of Birth">
    <div id="suggestions"></div>
  </div>

  <input type="date" id="dob">
  <input type="time" id="tob">

  <button onclick="generateKundli()">Generate Kundli</button>

  <div id="output" class="result"></div>

</div>

<script type="module">
import ModuleFactory from "/swisseph.js";

let Module = null;
let sweReady = false;

// ---------------- LOAD SWISS ----------------
ModuleFactory({
  locateFile: (file) => file.endsWith(".wasm") ? "/swisseph.wasm" : file
}).then((mod) => {
  Module = mod;

  Module.ccall("swe_set_ephe_path", null, ["string"], ["/ephe"]);
  Module.ccall("swe_set_sid_mode", null, ["number","number","number"], [1,0,0]);

  sweReady = true;
});

// ---------------- AUTOCOMPLETE ----------------
const placeInput = document.getElementById("place");
const suggestionsBox = document.getElementById("suggestions");

placeInput.addEventListener("input", async function () {
  const query = this.value;
  if (query.length < 3) return suggestionsBox.innerHTML = "";

  const res = await fetch(`https://photon.komoot.io/api/?q=${query}&limit=5`);
  const data = await res.json();

  suggestionsBox.innerHTML = "";

  data.features.forEach(p => {
    const full = `${p.properties.name || ""}, ${p.properties.city || ""}, ${p.properties.country || ""}`;

    const div = document.createElement("div");
    div.className = "suggestion-item";
    div.innerText = full;

    div.onclick = () => {
      placeInput.value = full;
      suggestionsBox.innerHTML = "";
      window.selectedLat = p.geometry.coordinates[1];
      window.selectedLon = p.geometry.coordinates[0];
    };

    suggestionsBox.appendChild(div);
  });
});

// ---------------- FALLBACK ----------------
async function getLatLon(place) {
  const API_KEY = "4110c45bd1ac444fa32a18f0799d0cb3";

  const res = await fetch(`https://api.opencagedata.com/geocode/v1/json?q=${place}&key=${API_KEY}`);
  const data = await res.json();

  if (!data.results.length) throw new Error("Location not found");

  return {
    lat: data.results[0].geometry.lat,
    lon: data.results[0].geometry.lng
  };
}

// ---------------- UTILS ----------------
function getJulianDay(date) {
  return (date / 86400000) + 2440587.5;
}

// ---------------- PLANETS ----------------
function getPlanetLongitude(jd, planet) {
  const ptr = Module._malloc(8 * 6);

  Module.ccall(
    "swe_calc_ut",
    null,
    ["number","number","number","number"],
    [jd, planet, 65536, ptr]
  );

  const lon = Module.HEAPF64[ptr / 8];
  Module._free(ptr);

  return (lon + 360) % 360;
}

// ---------------- ASCENDANT ----------------
function getAscendant(jd, lat, lon) {
  const cuspsPtr = Module._malloc(8 * 13);
  const ascmcPtr = Module._malloc(8 * 10);

  Module.ccall(
    "swe_houses_ex",
    null,
    ["number","number","number","number","number","number","number"],
    [jd, 65536, lat, lon, 80, cuspsPtr, ascmcPtr]
  );

  const asc = Module.HEAPF64[ascmcPtr / 8];

  Module._free(cuspsPtr);
  Module._free(ascmcPtr);

  return (asc + 360) % 360;
}

// ---------------- VEDIC HOUSES ----------------
function getHousesFromLagna(lagna) {
  let houses = [];
  for (let i = 0; i < 12; i++) {
    houses.push((lagna + i * 30) % 360);
  }
  return houses;
}

// ---------------- HOUSE MAPPING ----------------
function getHouseOfPlanet(p, cusps) {
  for (let i = 0; i < 12; i++) {
    let start = cusps[i];
    let end = cusps[(i + 1) % 12];

    if (end < start) end += 360;
    if (p < start) p += 360;

    if (p >= start && p < end) return i + 1;
  }
  return 1;
}

// ---------------- NAKSHATRA ----------------
const nakshatras = [
  "Ashwini","Bharani","Krittika","Rohini","Mrigashira","Ardra",
  "Punarvasu","Pushya","Ashlesha","Magha","Purva Phalguni","Uttara Phalguni",
  "Hasta","Chitra","Swati","Vishakha","Anuradha","Jyeshtha",
  "Mula","Purva Ashadha","Uttara Ashadha","Shravana","Dhanishta","Shatabhisha",
  "Purva Bhadrapada","Uttara Bhadrapada","Revati"
];

function getNakshatraDetails(moon) {
  const seg = 360/27;
  let i = Math.floor(moon / seg);
  i = Math.max(0, Math.min(26, i));

  const pada = Math.floor((moon % seg) / (seg/4)) + 1;

  return { name: nakshatras[i], pada };
}

// ---------------- RASHI ----------------
function getRashi(d) {
  return [
    "Aries","Taurus","Gemini","Cancer","Leo","Virgo",
    "Libra","Scorpio","Sagittarius","Capricorn","Aquarius","Pisces"
  ][Math.floor(d/30)];
}

// ---------------- PANCHANG ----------------
function calculatePanchang(sun, moon) {
  let diff = moon - sun;
  if (diff < 0) diff += 360;

  const tithiIndex = Math.floor(diff / 12);
  const paksha = tithiIndex < 15 ? "Shukla" : "Krishna";

  const tithiNames = [
    "Pratipada","Dwitiya","Tritiya","Chaturthi","Panchami","Shashthi","Saptami",
    "Ashtami","Navami","Dashami","Ekadashi","Dwadashi","Trayodashi","Chaturdashi","Purnima",
    "Pratipada","Dwitiya","Tritiya","Chaturthi","Panchami","Shashthi","Saptami",
    "Ashtami","Navami","Dashami","Ekadashi","Dwadashi","Trayodashi","Chaturdashi","Amavasya"
  ];

  const yogaNames = [
    "Vishkumbha","Priti","Ayushman","Saubhagya","Shobhana","Atiganda","Sukarma",
    "Dhriti","Shoola","Ganda","Vriddhi","Dhruva","Vyaghata","Harshana","Vajra",
    "Siddhi","Vyatipata","Variyana","Parigha","Shiva","Siddha","Sadhya",
    "Shubha","Shukla","Brahma","Indra","Vaidhriti"
  ];

  const karanaNames = [
    "Bava","Balava","Kaulava","Taitila","Garaja","Vanija","Vishti",
    "Bava","Balava","Kaulava","Taitila","Garaja","Vanija","Vishti",
    "Shakuni","Chatushpada","Nagava","Kimstughna"
  ];

  const yogIndex = Math.floor(((sun + moon) % 360) / (360/27));
  const karanaIndex = Math.floor(diff / 6);

  return {
    tithi: `${paksha} ${tithiNames[tithiIndex]}`,
    yog: yogaNames[yogIndex],
    karana: karanaNames[karanaIndex]
  };
}

// ---------------- MAIN ----------------
window.generateKundli = async function () {

  if (!sweReady) return alert("Engine loading...");

  const name = document.getElementById("name").value || "User";
  const place = document.getElementById("place").value;
  const dob = document.getElementById("dob").value;
  const tob = document.getElementById("tob").value;

  let lat = window.selectedLat;
  let lon = window.selectedLon;

  if (!lat || !lon) {
    const res = await getLatLon(place);
    lat = res.lat;
    lon = res.lon;
  }

  // ✅ FIXED TIMEZONE
  const localDate = new Date(dob + "T" + tob);
  const utcDate = new Date(localDate.getTime() - (5.5 * 60 * 60 * 1000));
  const jd = getJulianDay(utcDate);

  const sun = getPlanetLongitude(jd, 0);
  const moon = getPlanetLongitude(jd, 1);

  const lagna = getAscendant(jd, lat, lon);
  const houses = getHousesFromLagna(lagna);

  const nak = getNakshatraDetails(moon);
  const panchang = calculatePanchang(sun, moon);
  const rashi = getRashi(moon);

  const planets = {
    Sun: sun,
    Moon: moon,
    Mars: getPlanetLongitude(jd, 4),
    Mercury: getPlanetLongitude(jd, 2),
    Jupiter: getPlanetLongitude(jd, 5),
    Venus: getPlanetLongitude(jd, 3),
    Saturn: getPlanetLongitude(jd, 6)
  };

  let houseOutput = "";
  for (let p in planets) {
    houseOutput += `${p} → House ${getHouseOfPlanet(planets[p], houses)}<br>`;
  }

  document.getElementById("output").innerHTML = `
    <h2 class="highlight">${name}'s Kundli</h2>

    <h3>📌 Basic Details</h3>
    Name: ${name}<br>
    Date: ${dob}<br>
    Time: ${tob}<br>
    Place: ${place}<br>
    Lat: ${lat.toFixed(2)} | Lon: ${lon.toFixed(2)}<br>

    <h3>📅 Panchang</h3>
    Tithi: ${panchang.tithi}<br>
    Yog: ${panchang.yog}<br>
    Karan: ${panchang.karana}<br>
    Nakshatra: ${nak.name} (Pada ${nak.pada})<br>

    <h3>🏠 Lagna & Houses</h3>
    Lagna: ${getRashi(lagna)}<br><br>
    ${houseOutput}

    <h3>🧬 Avakhada</h3>
    Sign: ${rashi}<br>
  `;
};
</script>

</body>
</html>
