
<!DOCTYPE html>
<html>

<head>

<title>Free Kundli - Astrodhani</title>

<link rel="stylesheet" href="style.css">

<style>

.formbox{
max-width:500px;
margin:auto;
background:white;
color:black;
padding:30px;
border-radius:10px;
}

input{
width:100%;
padding:10px;
margin:10px 0;
border-radius:6px;
border:1px solid #ccc;
}

</style>

</head>

<body>

<header>

<div class="logo">🔮 Astrodhani</div>

<nav>

<a href="index.html">Home</a>
<a href="astrologers.html">Astrologers</a>
<a href="horoscope.html">Horoscope</a>
<a href="kundli.html">Free Kundli</a>

</nav>

</header>

<section class="container">


<div class="formbox">

<h2>Free AI Kundli Generator 🔮</h2>

<input id="name" placeholder="Your Name">

<input id="dob" type="date">

<input id="time" type="time">

<input id="place" placeholder="Birth Place">

<button onclick="generateKundli()">
Generate Kundli
</button>

<div id="result"></div>

</div>



</section>


<script>

async function generateKundli(){

let name = document.getElementById("name").value
let dob = document.getElementById("dob").value
let time = document.getElementById("time").value
let place = document.getElementById("place").value

if(!name || !dob){
alert("Please fill required details")
return
}

document.getElementById("result").innerHTML =
"<p>Generating your kundli...</p>"

let res = await fetch("/api/ai",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body: JSON.stringify({
question: `
Generate a Vedic astrology birth chart analysis.

Name: ${name}
Date of Birth: ${dob}
Time: ${time}
Place: ${place}

Respond STRICTLY in this format:

ZODIAC: ...
PERSONALITY: ...
CAREER: ...
LOVE: ...

Keep each section 2-3 lines only.


})
})

let data = await res.json()

if(data.answer){

let text = data.answer

function extract(label){
let regex = new RegExp(label + ":(.*)", "i")
let match = text.match(regex)
return match ? match[1].trim() : "Not available"
}

let zodiac = extract("ZODIAC")
let personality = extract("PERSONALITY")
let career = extract("CAREER")
let love = extract("LOVE")

document.getElementById("result").innerHTML =
`
<div class="kundli-grid">

<div class="kundli-card">
<h3>🔥 Zodiac Sign</h3>
<p>${zodiac}</p>
</div>

<div class="kundli-card">
<h3>🧠 Personality</h3>
<p>${personality}</p>
</div>

<div class="kundli-card">
<h3>💼 Career</h3>
<p>${career}</p>
</div>

<div class="kundli-card">
<h3>❤️ Love Life</h3>
<p>${love}</p>
</div>

</div>


}



}

</script>



</body>

</html>
