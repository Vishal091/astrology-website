<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Astrodhani Kundli 🔮</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b0f1a;
      color: white;
      text-align: center;
    }

    h1 {
      color: gold;
      margin-top: 20px;
    }

    .container {
      max-width: 500px;
      margin: auto;
      padding: 20px;
    }

    input, button {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border-radius: 10px;
      border: none;
    }

    input {
      background: #111827;
      color: white;
    }

    button {
      background: gold;
      color: black;
      font-weight: bold;
      cursor: pointer;
    }

    .result {
      margin-top: 20px;
      background: #111827;
      padding: 15px;
      border-radius: 10px;
    }

    .highlight {
      color: gold;
      font-weight: bold;
    }

    #suggestions {
      position: absolute;
      width: calc(100% - 40px);
      background: #111827;
      border-radius: 8px;
      max-height: 150px;
      overflow-y: auto;
      text-align: left;
      z-index: 10;
    }

    .suggestion-item {
      padding: 10px;
      cursor: pointer;
    }

    .suggestion-item:hover {
      background: #1f2937;
    }
  </style>
</head>

<body>

<h1>🔮 Astrodhani Kundli</h1>

<div class="container">

  <input type="text" id="name" placeholder="Enter Name">

  <!-- ✅ AUTOCOMPLETE WRAPPER -->
  <div style="position:relative;">
    <input type="text" id="place" placeholder="Place of Birth (e.g. Delhi, India)">
    <div id="suggestions"></div>
  </div>

  <input type="date" id="dob">
  <input type="time" id="tob">

  <button onclick="generateKundli()">Generate Kundli</button>

  <div id="output" class="result"></div>

</div>

<script type="module">
import ModuleFactory from "/swisseph.js";

let Module = null;
let sweReady = false;

// ---------------- LOAD SWISS EPHE ----------------

ModuleFactory({
  locateFile: (file) => {
    if (file.endsWith(".wasm")) {
      return "/swisseph.wasm";
    }
    return file;
  }
}).then((mod) => {

  Module = mod;

  console.log("✅ Swiss Ephemeris Loaded");

  Module.ccall("swe_set_ephe_path", null, ["string"], ["/ephe"]);
  Module.ccall("swe_set_sid_mode", null, ["number","number","number"], [1,0,0]);

  sweReady = true;
});

// ---------------- AUTOCOMPLETE ----------------

const placeInput = document.getElementById("place");
const suggestionsBox = document.getElementById("suggestions");

placeInput.addEventListener("input", async function () {
  const query = this.value;

  if (query.length < 3) {
    suggestionsBox.innerHTML = "";
    return;
  }

  const url = `https://photon.komoot.io/api/?q=${encodeURIComponent(query)}&limit=5`;

  const res = await fetch(url);
  const data = await res.json();

  suggestionsBox.innerHTML = "";

  data.features.forEach(place => {
    const name = place.properties.name || "";
    const city = place.properties.city || "";
    const country = place.properties.country || "";

    const fullName = `${name}${city ? ", " + city : ""}${country ? ", " + country : ""}`;

    const div = document.createElement("div");
    div.className = "suggestion-item";
    div.innerHTML = fullName;

    div.onclick = () => {
      placeInput.value = fullName;
      suggestionsBox.innerHTML = "";

      window.selectedLat = place.geometry.coordinates[1];
      window.selectedLon = place.geometry.coordinates[0];
    };

    suggestionsBox.appendChild(div);
  });
});

// ---------------- FALLBACK GEOCODING ----------------

async function getLatLon(place) {
  const API_KEY = "YOUR_API_KEY";

  const url = `https://api.opencagedata.com/geocode/v1/json?q=${encodeURIComponent(place)}&key=${API_KEY}`;

  const res = await fetch(url);
  const data = await res.json();

  if (!data.results.length) {
    throw new Error("Location not found");
  }

  const { lat, lng } = data.results[0].geometry;
  return { lat, lon: lng };
}

// ---------------- UTILS ----------------

function getJulianDay(date) {
  return (date / 86400000) + 2440587.5;
}

function getRashi(deg) {
  const rashis = [
    "Aries","Taurus","Gemini","Cancer","Leo","Virgo",
    "Libra","Scorpio","Sagittarius","Capricorn","Aquarius","Pisces"
  ];
  return rashis[Math.floor(deg / 30)];
}

function getNakshatra(deg) {
  const nakshatras = [
    "Ashwini","Bharani","Krittika","Rohini","Mrigashira","Ardra",
    "Punarvasu","Pushya","Ashlesha","Magha","Purva Phalguni","Uttara Phalguni",
    "Hasta","Chitra","Swati","Vishakha","Anuradha","Jyeshtha",
    "Mula","Purva Ashadha","Uttara Ashadha","Shravana","Dhanishta","Shatabhisha",
    "Purva Bhadrapada","Uttara Bhadrapada","Revati"
  ];
  return nakshatras[Math.floor(deg / (360/27))];
}

// ---------------- MAIN ----------------

window.generateKundli = async function () {

  if (!sweReady) {
    alert("⚠️ Engine loading... please wait");
    return;
  }

  const name = document.getElementById("name").value || "User";
  const place = document.getElementById("place").value;

  const dob = document.getElementById("dob").value;
  const tob = document.getElementById("tob").value;

  if (!dob || !tob || !place) {
    alert("Please fill all details");
    return;
  }

  try {

    document.getElementById("output").innerHTML = "🔄 Getting location...";

    let lat = window.selectedLat;
    let lon = window.selectedLon;

    if (!lat || !lon) {
      const res = await getLatLon(place);
      lat = res.lat;
      lon = res.lon;
    }

    const date = new Date(dob + "T" + tob);
    const jd = getJulianDay(date);

    document.getElementById("output").innerHTML = "🔄 Calculating kundli...";

    const sun = Module.ccall("swe_calc_ut", "number", ["number","number","number"], [jd, 0, 1]);
    const moon = Module.ccall("swe_calc_ut", "number", ["number","number","number"], [jd, 1, 1]);
    const mars = Module.ccall("swe_calc_ut", "number", ["number","number","number"], [jd, 4, 1]);
    const mercury = Module.ccall("swe_calc_ut", "number", ["number","number","number"], [jd, 2, 1]);
    const jupiter = Module.ccall("swe_calc_ut", "number", ["number","number","number"], [jd, 5, 1]);
    const venus = Module.ccall("swe_calc_ut", "number", ["number","number","number"], [jd, 3, 1]);
    const saturn = Module.ccall("swe_calc_ut", "number", ["number","number","number"], [jd, 6, 1]);
    const rahu = Module.ccall("swe_calc_ut", "number", ["number","number","number"], [jd, 10, 1]);
    const ketu = (rahu + 180) % 360;

    const lagna = moon; // temporary

    document.getElementById("output").innerHTML = `
      <h2 class="highlight">${name}'s Kundli</h2>
      <p><b>Place:</b> ${place}</p>

      <p><b>Lagna:</b> ${getRashi(lagna)}</p>
      <p><b>Moon Sign:</b> ${getRashi(moon)}</p>
      <p><b>Nakshatra:</b> ${getNakshatra(moon)}</p>

      <h3 class="highlight">Planets</h3>
      <p>☀ Sun: ${getRashi(sun)}</p>
      <p>🌙 Moon: ${getRashi(moon)}</p>
      <p>♂ Mars: ${getRashi(mars)}</p>
      <p>☿ Mercury: ${getRashi(mercury)}</p>
      <p>♃ Jupiter: ${getRashi(jupiter)}</p>
      <p>♀ Venus: ${getRashi(venus)}</p>
      <p>♄ Saturn: ${getRashi(saturn)}</p>
      <p>☊ Rahu: ${getRashi(rahu)}</p>
      <p>☋ Ketu: ${getRashi(ketu)}</p>
    `;

  } catch (err) {
    console.error(err);
    alert("❌ " + err.message);
  }
};
</script>

</body>
</html>
