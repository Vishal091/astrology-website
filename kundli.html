<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Astrodhani Kundli 🔮</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { margin:0; font-family:Arial; background:#0b0f1a; color:white; text-align:center; }
h1 { color:gold; margin-top:20px; }

.container { max-width:700px; margin:auto; padding:20px; }

input,button {
  width:100%; padding:12px; margin:8px 0;
  border-radius:10px; border:none;
}

input { background:#111827; color:white; }

button { background:gold; color:black; font-weight:bold; cursor:pointer; }

.result {
  margin-top:20px;
  background:#111827;
  padding:15px;
  border-radius:10px;
  text-align:left;
  overflow-x:auto;
}

table {
  width:100%;
  border-collapse:collapse;
  font-size:12px;
}

th, td {
  border:1px solid #333;
  padding:6px;
  text-align:center;
}

th { background:#1f2937; }

#suggestions {
  position:absolute;
  width:calc(100% - 40px);
  background:#111827;
  border-radius:8px;
  max-height:150px;
  overflow-y:auto;
  z-index:10;
}

.suggestion-item { padding:10px; cursor:pointer; }
.suggestion-item:hover { background:#1f2937; }
</style>
</head>

<body>

<h1>🔮 Astrodhani Kundli</h1>

<div class="container">

<input type="text" id="name" placeholder="Enter Name">

<div style="position:relative;">
  <input type="text" id="place" placeholder="Place of Birth">
  <div id="suggestions"></div>
</div>

<input type="date" id="dob">
<input type="time" id="tob">

<button onclick="generateKundli()">Generate Kundli</button>

<div id="output" class="result"></div>

</div>

<script type="module">
import ModuleFactory from "/swisseph.js";

let Module=null;
let sweReady=false;

ModuleFactory({
  locateFile:(f)=>f.endsWith(".wasm")?"/swisseph.wasm":f
}).then((mod)=>{
  Module=mod;
  Module.ccall("swe_set_ephe_path",null,["string"],["/ephe"]);
  Module.ccall("swe_set_sid_mode",null,["number","number","number"],[1,0,0]);
  sweReady=true;
});

// ---------- AUTOCOMPLETE ----------
const placeInput=document.getElementById("place");
const suggestions=document.getElementById("suggestions");

placeInput.addEventListener("input",async()=>{
  if(placeInput.value.length<3){ suggestions.innerHTML=""; return; }

  const res=await fetch(`https://photon.komoot.io/api/?q=${placeInput.value}&limit=5`);
  const data=await res.json();

  suggestions.innerHTML="";

  data.features.forEach(p=>{
    const name=`${p.properties.name||""}, ${p.properties.city||""}, ${p.properties.country||""}`;
    const div=document.createElement("div");
    div.className="suggestion-item";
    div.innerText=name;

    div.onclick=()=>{
      placeInput.value=name;
      window.selectedLat=p.geometry.coordinates[1];
      window.selectedLon=p.geometry.coordinates[0];
      suggestions.innerHTML="";
    };

    suggestions.appendChild(div);
  });
});

// ---------- FALLBACK ----------
async function getLatLon(place){
  const res=await fetch(`https://api.opencagedata.com/geocode/v1/json?q=${place}&key=YOUR_API_KEY`);
  const data=await res.json();
  return {
    lat:data.results[0].geometry.lat,
    lon:data.results[0].geometry.lng
  };
}

// ---------- UTILS ----------
function getJulianDay(date){
  return (date/86400000)+2440587.5;
}

function getPlanetData(jd,planet){
  const ptr=Module._malloc(8*6);

  Module.ccall("swe_calc_ut",null,
    ["number","number","number","number"],
    [jd,planet,65536,ptr]
  );

  const lon=Module.HEAPF64[ptr/8];
  const speed=Module.HEAPF64[(ptr/8)+3];

  Module._free(ptr);

  return { lon:(lon+360)%360, retro:speed<0 };
}

// ---------- MAPS ----------
const rashis=["Aries","Taurus","Gemini","Cancer","Leo","Virgo","Libra","Scorpio","Sagittarius","Capricorn","Aquarius","Pisces"];

const signLords={
Aries:"Mars",Taurus:"Venus",Gemini:"Mercury",Cancer:"Moon",
Leo:"Sun",Virgo:"Mercury",Libra:"Venus",Scorpio:"Mars",
Sagittarius:"Jupiter",Capricorn:"Saturn",Aquarius:"Saturn",Pisces:"Jupiter"
};

const nakshatras=[
"Ashwini","Bharani","Krittika","Rohini","Mrigashira","Ardra",
"Punarvasu","Pushya","Ashlesha","Magha","Purva Phalguni","Uttara Phalguni",
"Hasta","Chitra","Swati","Vishakha","Anuradha","Jyeshtha",
"Mula","Purva Ashadha","Uttara Ashadha","Shravana","Dhanishta","Shatabhisha",
"Purva Bhadrapada","Uttara Bhadrapada","Revati"
];

const nakshatraLords=[
"Ketu","Venus","Sun","Moon","Mars","Rahu","Jupiter","Saturn","Mercury",
"Ketu","Venus","Sun","Moon","Mars","Rahu","Jupiter","Saturn","Mercury",
"Ketu","Venus","Sun","Moon","Mars","Rahu","Jupiter","Saturn","Mercury"
];

function getRashi(d){ return rashis[Math.floor(d/30)]; }

function getNakshatraDetails(m){
  const seg=360/27;
  let i=Math.floor(m/seg);
  const pada=Math.floor((m%seg)/(seg/4))+1;
  return {name:nakshatras[i],pada,index:i};
}

// ---------- EXTRA LOGIC ----------
function formatDegree(d){
  const deg=Math.floor(d);
  const min=Math.floor((d-deg)*60);
  const sec=Math.floor(((d-deg)*60-min)*60);
  return `${deg}°${min}′${sec}″`;
}

function isCombust(p,d,sun){
  const lim={Mercury:14,Venus:10,Mars:17,Jupiter:11,Saturn:15};
  if(!lim[p]) return false;
  let diff=Math.abs(d-sun);
  if(diff>180) diff=360-diff;
  return diff<lim[p];
}

function getAvastha(d){
  if(d<6) return "Bala";
  if(d<12) return "Kumara";
  if(d<18) return "Yuva";
  if(d<24) return "Vriddha";
  return "Mrita";
}

function getStatus(p,r){
  const ex={Sun:"Aries",Moon:"Taurus",Mars:"Capricorn",Mercury:"Virgo",Jupiter:"Cancer",Venus:"Pisces",Saturn:"Libra"};
  const de={Sun:"Libra",Moon:"Scorpio",Mars:"Cancer",Mercury:"Pisces",Jupiter:"Capricorn",Venus:"Virgo",Saturn:"Aries"};

  if(r===ex[p]) return "Exalted";
  if(r===de[p]) return "Debilitated";
  return "Normal";
}

// ---------- LAGNA ----------
function getAscendant(jd,lat,lon){
  const p1=Module._malloc(8*13);
  const p2=Module._malloc(8*10);

  Module.ccall("swe_houses_ex",null,
    ["number","number","number","number","number","number","number"],
    [jd,65536,lat,lon,80,p1,p2]
  );

  const asc=Module.HEAPF64[p2/8];
  Module._free(p1); Module._free(p2);
  return (asc+360)%360;
}

function getHouses(lagna){
  let h=[];
  for(let i=0;i<12;i++) h.push((lagna+i*30)%360);
  return h;
}

function getHouseOfPlanet(p,c){
  for(let i=0;i<12;i++){
    let s=c[i],e=c[(i+1)%12];
    if(e<s) e+=360;
    if(p<s) p+=360;
    if(p>=s&&p<e) return i+1;
  }
  return 1;
}

// ---------- MAIN ----------
window.generateKundli=async function(){

if(!sweReady) return alert("Engine loading...");

const name=document.getElementById("name").value||"User";
const place=document.getElementById("place").value;
const dob=document.getElementById("dob").value;
const tob=document.getElementById("tob").value;

let lat=window.selectedLat,lon=window.selectedLon;
if(!lat){const r=await getLatLon(place);lat=r.lat;lon=r.lon;}

const local=new Date(dob+"T"+tob);
const utc=new Date(local.getTime()-19800000);
const jd=getJulianDay(utc);

const planetMap={Sun:0,Moon:1,Mars:4,Mercury:2,Jupiter:5,Venus:3,Saturn:6};

const sunData=getPlanetData(jd,0);
const lagna=getAscendant(jd,lat,lon);
const houses=getHouses(lagna);

let rows="";

for(let p in planetMap){

  const data=getPlanetData(jd,planetMap[p]);
  const deg=data.lon;
  const r=getRashi(deg);
  const nak=getNakshatraDetails(deg);
  const house=getHouseOfPlanet(deg,houses);

  rows+=`
  <tr>
    <td>${p}</td>
    <td>${r}</td>
    <td>${signLords[r]}</td>
    <td>${nak.name}</td>
    <td>${nakshatraLords[nak.index]}</td>
    <td>${formatDegree(deg)}</td>
    <td>${data.retro?"Retro":"Direct"}</td>
    <td>${isCombust(p,deg,sunData.lon)?"Yes":"No"}</td>
    <td>${getAvastha(deg)}</td>
    <td>${house}</td>
    <td>${getStatus(p,r)}</td>
  </tr>`;
}

document.getElementById("output").innerHTML=`
<h3>${name}'s Kundli</h3>

<table>
<tr>
<th>Planet</th><th>Sign</th><th>Sign Lord</th>
<th>Nakshatra</th><th>Naksh Lord</th>
<th>Degree</th><th>Retro</th><th>Combust</th>
<th>Avastha</th><th>House</th><th>Status</th>
</tr>
${rows}
</table>
`;
}
</script>

</body>
</html>
