<!DOCTYPE html>
<html>

<head>
<title>Astrodhani - Free Kundli</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<div class="logo">🔮 Astrodhani</div>

<nav>
<a href="index.html">Home</a>
<a href="astrologers.html">Astrologers</a>
<a href="horoscope.html">Horoscope</a>
<a href="kundli.html">Free Kundli</a>
</nav>

<div class="wallet">
₹<span id="wallet">500</span>
</div>
</header>

<div class="container">

<div class="formbox">

<h2>Free AI Kundli Generator 🔮</h2>

<input id="name" placeholder="Your Name">

<input id="dob" type="date">

<input id="time" type="time">

<input id="place" placeholder="Birth Place">

<button onclick="generateKundli()">Generate Kundli</button>

<div id="result"></div>

</div>

</div>

<style>

body{
background:#0B0F2A;
color:white;
font-family:Arial;
}

.container{
padding:40px;
}

.formbox{
max-width:500px;
margin:auto;
background:#141A40;
padding:30px;
border-radius:12px;
}

.formbox input{
width:100%;
padding:10px;
margin:10px 0;
border-radius:6px;
border:none;
}

.formbox button{
width:100%;
padding:12px;
background:#6C5CE7;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

#result{
margin-top:20px;
}

.kundli-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
margin-top:20px;
}

.kundli-card{
background:#141A40;
padding:20px;
border-radius:12px;
color:white;
box-shadow:0 0 15px rgba(108,92,231,0.4);
}

.kundli-card h3{
margin-bottom:10px;
color:#F9CA24;
}

</style>

<script>

async function generateKundli(){

console.log("clicked")

let name = document.getElementById("name").value
let dob = document.getElementById("dob").value
let time = document.getElementById("time").value
let place = document.getElementById("place").value
let zodiacReal = getZodiac(dob)
if(!name || !dob){
alert("Please fill required details")
return
}

document.getElementById("result").innerHTML =
"<p>Generating your kundli...</p>"

try{

let res = await fetch("/api/ai",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body: JSON.stringify({
question:
"Generate a Vedic astrology birth chart.\n" +
"Name: " + name + "\n" +
"DOB: " + dob + "\n" +
"Time: " + time + "\n" +
"Place: " + place + "\n\n" +
"Respond ONLY in this format:\n" +
"PERSONALITY: ...\n" +
"CAREER: ...\n" +
"LOVE: ..." + 
zodiacReal
})
})

let data = await res.json()

console.log(data)

if(!data.answer){
document.getElementById("result").innerHTML =
"<p>AI not responding</p>"
return
}

let text = data.answer

function extract(label){
let regex = new RegExp(label + ":(.*)", "i")
let match = text.match(regex)
return match ? match[1].trim() : "Not available"
}

let zodiac = zodiacReal
let personality = extract("PERSONALITY")
let career = extract("CAREER")
let love = extract("LOVE")

document.getElementById("result").innerHTML =
"<div class='kundli-grid'>" +

"<div class='kundli-card zodiac'><h3>🔥 Zodiac</h3><p>"+zodiac+"</p></div>" +
"<div class='kundli-card personality'><h3>🧠 Personality</h3><p>"+personality+"</p></div>" +
"<div class='kundli-card career'><h3>💼 Career</h3><p>"+career+"</p></div>" +
"<div class='kundli-card love'><h3>❤️ Love</h3><p>"+love+"</p></div>"

"</div>"

}catch(err){

console.log(err)

document.getElementById("result").innerHTML =
"<p>Error generating kundli</p>"

}

}


function getZodiac(date){

let d = new Date(date)
let day = d.getDate()
let month = d.getMonth() + 1

if((month==3 && day>=21) || (month==4 && day<=19)) return "Aries"
if((month==4 && day>=20) || (month==5 && day<=20)) return "Taurus"
if((month==5 && day>=21) || (month==6 && day<=20)) return "Gemini"
if((month==6 && day>=21) || (month==7 && day<=22)) return "Cancer"
if((month==7 && day>=23) || (month==8 && day<=22)) return "Leo"
if((month==8 && day>=23) || (month==9 && day<=22)) return "Virgo"
if((month==9 && day>=23) || (month==10 && day<=22)) return "Libra"
if((month==10 && day>=23) || (month==11 && day<=21)) return "Scorpio"
if((month==11 && day>=22) || (month==12 && day<=21)) return "Sagittarius"
if((month==12 && day>=22) || (month==1 && day<=19)) return "Capricorn"
if((month==1 && day>=20) || (month==2 && day<=18)) return "Aquarius"
if((month==2 && day>=19) || (month==3 && day<=20)) return "Pisces"

return "Unknown"
}



</script>

</body>
</html>
