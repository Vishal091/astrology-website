<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Astrodhani Kundli Generator 🔮</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: radial-gradient(circle at top, #0b0f1a, #05070d);
      color: #fff;
      text-align: center;
    }

    h1 {
      margin-top: 20px;
      color: gold;
    }

    .container {
      padding: 20px;
      max-width: 500px;
      margin: auto;
    }

    input, button {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border-radius: 10px;
      border: none;
      font-size: 14px;
    }

    input {
      background: #111827;
      color: white;
    }

    button {
      background: gold;
      color: black;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.03);
    }

    .result {
      margin-top: 20px;
      padding: 15px;
      background: #111827;
      border-radius: 10px;
    }

    .chart {
      margin-top: 25px;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 2px;
    }

    .box {
      border: 1px solid #444;
      padding: 10px;
      min-height: 60px;
      font-size: 12px;
    }

    .highlight {
      color: gold;
      font-weight: bold;
    }
  </style>
</head>

<body>

<h1>🔮 Astrodhani Kundli</h1>

<div class="container">

  <input type="text" id="name" placeholder="Enter Name">
  <input type="date" id="dob">
  <input type="time" id="tob">
  <input type="text" id="place" placeholder="Place of Birth">
  <input type="number" id="lat" placeholder="Latitude">
  <input type="number" id="lon" placeholder="Longitude">

  <button onclick="generateKundli()">Generate Kundli</button>

  <div id="output" class="result"></div>

  <div id="chart" class="chart"></div>

</div>

<script src="swisseph.js"></script>

<script>
let sweReady = false;

Module.onRuntimeInitialized = function () {
  console.log("Swiss Ephemeris Loaded");
  sweReady = true;

  // Set ephemeris path
  swe_set_ephe_path("./ephe");

  // Set Lahiri Ayanamsa (IMPORTANT)
  swe_set_sid_mode(1, 0, 0);
};

// ---------------- UTILS ----------------

function getJulianDay(date) {
  return (date / 86400000) + 2440587.5;
}

function getRashi(deg) {
  const rashis = [
    "Aries","Taurus","Gemini","Cancer","Leo","Virgo",
    "Libra","Scorpio","Sagittarius","Capricorn","Aquarius","Pisces"
  ];
  return rashis[Math.floor(deg / 30)];
}

function getNakshatra(deg) {
  const nakshatras = [
    "Ashwini","Bharani","Krittika","Rohini","Mrigashira","Ardra",
    "Punarvasu","Pushya","Ashlesha","Magha","Purva Phalguni","Uttara Phalguni",
    "Hasta","Chitra","Swati","Vishakha","Anuradha","Jyeshtha",
    "Mula","Purva Ashadha","Uttara Ashadha","Shravana","Dhanishta","Shatabhisha",
    "Purva Bhadrapada","Uttara Bhadrapada","Revati"
  ];
  return nakshatras[Math.floor(deg / (360/27))];
}

// ---------------- CORE CALC ----------------

function calcPlanet(jd, planet) {
  const result = swe_calc_ut(jd, planet, 1); // sidereal
  return result[0]; // longitude
}

// ---------------- MAIN ----------------

function generateKundli() {

  if (!sweReady) {
    alert("Engine loading... please wait");
    return;
  }

  const dob = document.getElementById("dob").value;
  const tob = document.getElementById("tob").value;
  const lat = parseFloat(document.getElementById("lat").value);
  const lon = parseFloat(document.getElementById("lon").value);

  if (!dob || !tob) {
    alert("Enter full details");
    return;
  }

  const date = new Date(dob + "T" + tob);
  const jd = getJulianDay(date);

  // ---------------- PLANETS ----------------

  const sun = calcPlanet(jd, 0);
  const moon = calcPlanet(jd, 1);
  const mars = calcPlanet(jd, 4);
  const mercury = calcPlanet(jd, 2);
  const jupiter = calcPlanet(jd, 5);
  const venus = calcPlanet(jd, 3);
  const saturn = calcPlanet(jd, 6);
  const rahu = calcPlanet(jd, 10);
  const ketu = (rahu + 180) % 360;

  // ---------------- LAGNA ----------------

  const houses = swe_houses(jd, lat, lon, 'P');
  const lagna = houses[0]; // Ascendant

  // ---------------- OUTPUT ----------------

  document.getElementById("output").innerHTML = `
    <h2>🪐 Accurate Kundli</h2>
    <p><b>Lagna:</b> ${getRashi(lagna)}</p>
    <p><b>Moon Sign:</b> ${getRashi(moon)}</p>
    <p><b>Nakshatra:</b> ${getNakshatra(moon)}</p>

    <h3>Planets</h3>
    <p>☀ Sun: ${getRashi(sun)}</p>
    <p>🌙 Moon: ${getRashi(moon)}</p>
    <p>♂ Mars: ${getRashi(mars)}</p>
    <p>☿ Mercury: ${getRashi(mercury)}</p>
    <p>♃ Jupiter: ${getRashi(jupiter)}</p>
    <p>♀ Venus: ${getRashi(venus)}</p>
    <p>♄ Saturn: ${getRashi(saturn)}</p>
    <p>☊ Rahu: ${getRashi(rahu)}</p>
    <p>☋ Ketu: ${getRashi(ketu)}</p>
  `;
}
</script>

</body>
</html>
