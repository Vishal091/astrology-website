<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Astrodhani Kundli Generator 🔮</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: radial-gradient(circle at top, #0b0f1a, #05070d);
      color: #fff;
      text-align: center;
    }

    h1 {
      margin-top: 20px;
      color: gold;
    }

    .container {
      padding: 20px;
      max-width: 500px;
      margin: auto;
    }

    input, button {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border-radius: 10px;
      border: none;
      font-size: 14px;
    }

    input {
      background: #111827;
      color: white;
    }

    button {
      background: gold;
      color: black;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.03);
    }

    .result {
      margin-top: 20px;
      padding: 15px;
      background: #111827;
      border-radius: 10px;
    }

    .chart {
      margin-top: 25px;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 2px;
    }

    .box {
      border: 1px solid #444;
      padding: 10px;
      min-height: 60px;
      font-size: 12px;
    }

    .highlight {
      color: gold;
      font-weight: bold;
    }
  </style>
</head>

<body>

<h1>🔮 Astrodhani Kundli</h1>

<div class="container">

  <input type="text" id="name" placeholder="Enter Name">
  <input type="date" id="dob">
  <input type="time" id="tob">
  <input type="text" id="place" placeholder="Place of Birth">
  <input type="number" id="lat" placeholder="Latitude">
  <input type="number" id="lon" placeholder="Longitude">

  <button onclick="generateKundli()">Generate Kundli</button>

  <div id="output" class="result"></div>

  <div id="chart" class="chart"></div>

</div>

<script>
const rashis = [
  "Aries","Taurus","Gemini","Cancer","Leo","Virgo",
  "Libra","Scorpio","Sagittarius","Capricorn","Aquarius","Pisces"
];

const nakshatras = [
  "Ashwini","Bharani","Krittika","Rohini","Mrigashira","Ardra",
  "Punarvasu","Pushya","Ashlesha","Magha","Purva Phalguni","Uttara Phalguni",
  "Hasta","Chitra","Swati","Vishakha","Anuradha","Jyeshtha",
  "Mula","Purva Ashadha","Uttara Ashadha","Shravana","Dhanishta","Shatabhisha",
  "Purva Bhadrapada","Uttara Bhadrapada","Revati"
];

// ---------------- BASIC UTILS ----------------

function getJulianDay(date) {
  return (date / 86400000) + 2440587.5;
}

function getRashi(deg) {
  return rashis[Math.floor(deg / 30)];
}

function getNakshatra(deg) {
  return nakshatras[Math.floor(deg / (360/27))];
}

// ---------------- PLACEHOLDER CALCULATIONS ----------------
// ⚠️ Replace this with Swiss Ephemeris later

function fakePlanet(degFactor, jd) {
  return (jd * degFactor) % 360;
}

// ---------------- MAIN FUNCTION ----------------

function generateKundli() {
  const name = document.getElementById("name").value;
  const dob = document.getElementById("dob").value;
  const tob = document.getElementById("tob").value;
  const lat = parseFloat(document.getElementById("lat").value);
  const lon = parseFloat(document.getElementById("lon").value);

  if (!dob || !tob || isNaN(lat) || isNaN(lon)) {
    alert("Please fill all details properly");
    return;
  }

  const date = new Date(dob + "T" + tob);
  const jd = getJulianDay(date);

  // ---------------- FAKE DATA (TO BE REPLACED) ----------------
  const sun = fakePlanet(0.985, jd);
  const moon = fakePlanet(13.176, jd);
  const mars = fakePlanet(0.524, jd);
  const mercury = fakePlanet(1.38, jd);
  const jupiter = fakePlanet(0.083, jd);
  const venus = fakePlanet(1.2, jd);
  const saturn = fakePlanet(0.033, jd);

  const lagna = (jd * 0.985 + lon) % 360;

  // ---------------- DERIVED ----------------
  const moonRashi = getRashi(moon);
  const lagnaRashi = getRashi(lagna);
  const nakshatra = getNakshatra(moon);

  // ---------------- OUTPUT ----------------
  document.getElementById("output").innerHTML = `
    <h2 class="highlight">${name || "User"}'s Kundli</h2>
    <p><b>Lagna:</b> ${lagnaRashi}</p>
    <p><b>Moon Sign:</b> ${moonRashi}</p>
    <p><b>Nakshatra:</b> ${nakshatra}</p>

    <h3 class="highlight">Planets</h3>
    <p>☀ Sun: ${getRashi(sun)}</p>
    <p>🌙 Moon: ${moonRashi}</p>
    <p>♂ Mars: ${getRashi(mars)}</p>
    <p>☿ Mercury: ${getRashi(mercury)}</p>
    <p>♃ Jupiter: ${getRashi(jupiter)}</p>
    <p>♀ Venus: ${getRashi(venus)}</p>
    <p>♄ Saturn: ${getRashi(saturn)}</p>
  `;

  generateChart(lagnaRashi);
}

// ---------------- CHART ----------------

function generateChart(lagna) {
  const chart = document.getElementById("chart");
  chart.innerHTML = "";

  for (let i = 1; i <= 12; i++) {
    const div = document.createElement("div");
    div.className = "box";

    if (i === 1) {
      div.innerHTML = `<b>Lagna</b><br>${lagna}`;
    } else {
      div.innerHTML = `House ${i}`;
    }

    chart.appendChild(div);
  }
}
</script>

</body>
</html>
