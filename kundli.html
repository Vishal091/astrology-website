
<!DOCTYPE html>
<html>

<head>

<title>Free Kundli - Astrodhani</title>

<link rel="stylesheet" href="style.css">

<style>

.formbox{
max-width:500px;
margin:auto;
background:white;
color:black;
padding:30px;
border-radius:10px;
}

input{
width:100%;
padding:10px;
margin:10px 0;
border-radius:6px;
border:1px solid #ccc;
}

</style>

</head>

<body>

<header>

<div class="logo">🔮 Astrodhani</div>

<nav>

<a href="index.html">Home</a>
<a href="astrologers.html">Astrologers</a>
<a href="horoscope.html">Horoscope</a>
<a href="kundli.html">Free Kundli</a>

</nav>

</header>

<section class="container">


<div class="formbox">

<h2>Free AI Kundli Generator 🔮</h2>

<input id="name" placeholder="Your Name">

<input id="dob" type="date">

<input id="time" type="time">

<input id="place" placeholder="Birth Place">

<button onclick="generateKundli()">
Generate Kundli
</button>

<div id="result"></div>

</div>



</section>


<script>

async function generateKundli(){

let name = document.getElementById("name").value
let dob = document.getElementById("dob").value
let time = document.getElementById("time").value
let place = document.getElementById("place").value

if(!name || !dob){
alert("Please fill required details")
return
}

document.getElementById("result").innerHTML =
"<p>Generating your kundli...</p>"

let res = await fetch("/api/ai",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body: JSON.stringify({
question:
`Generate a Vedic astrology birth chart analysis.

Name: ${name}
Date of Birth: ${dob}
Time: ${time}
Place: ${place}

Include:
- Zodiac sign
- Personality traits
- Career insights
- Love and marriage outlook

Respond in a structured format.`
})
})

let data = await res.json()

if(data.answer){

document.getElementById("result").innerHTML =
"<div class='card'><pre style='white-space:pre-wrap;font-family:inherit;'>"+data.answer+"</pre></div>"

}else{

document.getElementById("result").innerHTML =
"<p>Unable to generate kundli right now.</p>"

}

}

</script>



</body>

</html>
