
<!DOCTYPE html>
<html>

<head>

<title>Shubham Pandit Ji</title>
<link rel="stylesheet" href="style.css">

</head>

<body>

<header>
<div class="logo">🔮 Shubham Pandit Ji</div>
</header>

<div class="container">

<div class="card">

<h2>Ask Shubham pandit ji</h2>

<input id="question" placeholder="Ask about your future">

<button onclick="askAI()">Ask</button>

<div id="aiResponse"></div>

</div>

</div>

<script>

const API_KEY = "YOUR_GEMINI_API_KEY";

async function askAI(){

let question = document.getElementById("question").value;

if(!question){
alert("Please enter a question");
return;
}

document.getElementById("aiResponse").innerHTML =
"<p>Consulting the stars...</p>";

try{

let response = await fetch(
"https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key="+API_KEY,
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
contents:[
{
parts:[
{
text:"You are a helpful Vedic astrologer. Answer this question: "+question
}
]
}
]
})
}
);

let data = await response.json();

if(data.candidates){

let answer = data.candidates[0].content.parts[0].text;

document.getElementById("aiResponse").innerHTML =
"<p>"+answer+"</p>";

}else{

document.getElementById("aiResponse").innerHTML =
"<p>AI couldn't generate a response.</p>";

console.log(data);

}

}catch(error){

console.log(error);

document.getElementById("aiResponse").innerHTML =
"<p>Error contacting AI service.</p>";

}

}

</script>


</body>
</html>
