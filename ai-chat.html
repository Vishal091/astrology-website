
<!DOCTYPE html>
<html>

<head>

<title>Shubham Pandit Ji</title>
<link rel="stylesheet" href="style.css">

</head>

<body>

<header>
<div class="logo">🔮 Shubham Pandit Ji</div>
</header>

<div class="container">

<div class="card">

<h2>Ask Shubham pandit ji</h2>

<input id="question" placeholder="Ask about your future">

<button onclick="askAI()">Ask</button>

<div id="aiResponse"></div>

</div>

</div>


<script>

const HF_TOKEN = "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";

async function askAI(){

let question = document.getElementById("question").value;

if(!question){
alert("Please enter a question");
return;
}

document.getElementById("aiResponse").innerHTML =
"<p>Consulting the stars...</p>";

try{

let response = await fetch(
"https://api-inference.huggingface.co/models/mistralai/Mistral-7B-Instruct-v0.2",
{
method:"POST",
headers:{
"Authorization":"Bearer "+HF_TOKEN,
"Content-Type":"application/json"
},
body:JSON.stringify({
inputs:
"You are a wise Vedic astrologer giving calm spiritual advice.\nUser question: "+question
})
}
);

let data = await response.json();

console.log(data);

if(data.error){

document.getElementById("aiResponse").innerHTML =
"<p>The cosmic model is waking up. Try again in a few seconds.</p>";

return;

}

let answer = data[0].generated_text;

document.getElementById("aiResponse").innerHTML =
"<p>"+answer+"</p>";

}catch(err){

console.log(err);

document.getElementById("aiResponse").innerHTML =
"<p>AI connection failed.</p>";

}

}

</script>





</body>
</html>
