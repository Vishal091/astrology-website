
<!DOCTYPE html>
<html>

<head>

<title>Shubham Pandit Ji</title>
<link rel="stylesheet" href="style.css">

</head>

<body>

<header>
<div class="logo">🔮 Shubham Pandit Ji</div>
</header>

<div class="container">

<div class="card">

<h2>Ask Shubham pandit ji</h2>

<input id="question" placeholder="Ask about your future">

<button onclick="askAI()">Ask</button>

<div id="aiResponse"></div>

</div>

</div>

<script>

const API_KEY = "YOUR_GEMINI_API_KEY";

async function askAI(){

let question = document.getElementById("question").value;

if(!question){
alert("Please enter a question");
return;
}

document.getElementById("aiResponse").innerHTML =
"<p>Consulting the stars...</p>";

try{

let response = await fetch(
"https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key="+API_KEY,
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
contents:[
{
role:"user",
parts:[
{
text:"You are a calm Vedic astrologer. Answer spiritually but avoid absolute predictions. Question: "+question
}
]
}
]
})
}
);

let data = await response.json();

console.log(data);   // useful for debugging

if(data.candidates && data.candidates.length > 0){

let answer = data.candidates[0].content.parts[0].text;

document.getElementById("aiResponse").innerHTML =
"<p>"+answer+"</p>";

}else{

document.getElementById("aiResponse").innerHTML =
"<p>The stars are unclear right now. Please try another question.</p>";

}

}catch(error){

console.error(error);

document.getElementById("aiResponse").innerHTML =
"<p>AI connection error.</p>";

}

}

</script>


</body>
</html>
