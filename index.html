<!DOCTYPE html>
<html>
<head>
<title>Astrodhani</title>

<meta name="description" content="Premium astrology platform">

<style>

/* ===== BODY ===== */
body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:#FFF5F5;
color:#3b0000;
overflow-x:hidden;
perspective:1000px;
}

/* ===== NAVBAR ===== */
.navbar{
position:sticky;
top:0;
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 40px;
background:#A83232;
color:white;
z-index:1000;
}

.logo{display:flex;gap:10px;align-items:center;}
.logo img{width:40px}

/* ===== HERO ===== */
.hero{
padding:120px 20px;
text-align:center;
background:linear-gradient(135deg,#A83232,#7B1E1E);
color:white;
position:relative;
overflow:hidden;
}

.hero h1{
font-size:48px;
transform-style:preserve-3d;
}

/* GLOW LIGHT */
.light{
position:absolute;
width:300px;
height:300px;
background:radial-gradient(circle,rgba(255,215,0,0.3),transparent);
top:20%;
left:20%;
filter:blur(80px);
animation:moveLight 10s infinite alternate;
}

@keyframes moveLight{
to{transform:translate(200px,100px);}
}

/* ===== GRID ===== */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
padding:40px;
}

/* ===== 3D CARD ===== */
.card{
background:rgba(255,255,255,0.6);
backdrop-filter:blur(15px);
padding:25px;
border-radius:15px;
transition:0.3s;
transform-style:preserve-3d;
cursor:pointer;
position:relative;
}

.card::after{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:linear-gradient(120deg,transparent,rgba(255,255,255,0.4),transparent);
opacity:0;
transition:0.3s;
}

.card:hover::after{
opacity:1;
}

.card:hover{
box-shadow:0 20px 40px rgba(0,0,0,0.2);
}

/* ===== CTA ===== */
.cta{
background:#A83232;
color:white;
padding:60px;
text-align:center;
}

/* FLOAT BUTTON */
.float-btn{
position:fixed;
bottom:20px;
right:20px;
background:#A83232;
color:white;
padding:15px;
border-radius:50%;
cursor:pointer;
}

</style>
</head>

<body>

<header class="navbar">
<div class="logo">
<img src="hanuman-logo.png">
Astrodhani
</div>
</header>

<!-- HERO -->
<div class="hero">

<div class="light"></div>

<h1 id="typing-text"></h1>
<p>Premium Vedic Astrology</p>

</div>

<!-- SERVICES -->
<div class="grid">
<div class="card">Love Problem</div>
<div class="card">Career Growth</div>
<div class="card">Protection</div>
<div class="card">Healing</div>
</div>

<!-- CTA -->
<div class="cta">
<h2>Talk to Astrologer</h2>
<button>Chat Now</button>
</div>

<div class="float-btn">🤖</div>

<script>

/* TYPING */
let text="Unlock Your Destiny 🔮";
let i=0;
function type(){
if(i<text.length){
document.getElementById("typing-text").innerHTML+=text[i];
i++;
setTimeout(type,40);
}}
type();

/* 3D CARD EFFECT */
document.querySelectorAll(".card").forEach(card=>{
card.addEventListener("mousemove",e=>{
const rect=card.getBoundingClientRect();
const x=e.clientX-rect.left;
const y=e.clientY-rect.top;

card.style.transform=`
rotateX(${(y-rect.height/2)/15}deg)
rotateY(${(x-rect.width/2)/15}deg)
`;
});

card.addEventListener("mouseleave",()=>{
card.style.transform="rotateX(0) rotateY(0)";
});
});

/* PARALLAX LIGHT */
document.addEventListener("mousemove",e=>{
document.querySelector(".light").style.transform=
`translate(${e.clientX/20}px,${e.clientY/20}px)`;
});

</script>

</body>
</html>
