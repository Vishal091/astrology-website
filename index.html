<!DOCTYPE html>
<html>
<head>
<title>Astrodhani</title>

<meta name="description" content="Accurate astrology predictions, kundli, horoscope and remedies.">

<style>

/* ===== BODY ===== */
body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:#FFF5F5;
color:#3b0000;
overflow-x:hidden;
}

/* ===== NAVBAR ===== */
.navbar{
position:sticky;
top:0;
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 40px;
background:#A83232;
color:white;
z-index:1000;
}

.logo{display:flex;gap:10px;align-items:center;}
.logo img{width:40px}

nav a{
color:#FFD700;
margin:0 10px;
text-decoration:none;
}

/* ===== HERO ===== */
.hero{
padding:120px 20px;
text-align:center;
background:linear-gradient(270deg,#A83232,#7B1E1E,#A83232);
background-size:400% 400%;
animation:gradientMove 8s ease infinite;
color:white;
}

@keyframes gradientMove{
0%{background-position:0%}
50%{background-position:100%}
100%{background-position:0%}
}

.hero h1{font-size:48px}

.hero button{
padding:12px 30px;
background:#FFD700;
border:none;
border-radius:8px;
cursor:pointer;
animation:pulse 2s infinite;
}

@keyframes pulse{
0%{transform:scale(1)}
50%{transform:scale(1.05)}
100%{transform:scale(1)}
}

/* ===== SECTION ===== */
.section{
padding:60px 20px;
text-align:center;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

/* ===== CARD ===== */
.card{
background:rgba(255,255,255,0.6);
backdrop-filter:blur(10px);
padding:20px;
border-radius:12px;
transition:0.4s;
cursor:pointer;
}

.card:hover{
transform:translateY(-10px) scale(1.03);
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

/* ===== REVEAL ===== */
.reveal{
opacity:0;
transform:translateY(40px);
transition:0.8s;
}

.reveal.active{
opacity:1;
transform:translateY(0);
}

/* ===== CTA ===== */
.cta{
background:#A83232;
color:white;
padding:60px;
text-align:center;
}

/* ===== PARTICLES ===== */
.particle{
position:fixed;
width:6px;
height:6px;
background:gold;
border-radius:50%;
opacity:0.3;
animation:floatUp linear infinite;
}

@keyframes floatUp{
from{transform:translateY(100vh);}
to{transform:translateY(-10vh);}
}

/* ===== CHATBOT ===== */
#chatbot{
position:fixed;
bottom:90px;
right:20px;
width:280px;
background:white;
display:none;
flex-direction:column;
border-radius:10px;
}

.float-btn{
position:fixed;
bottom:20px;
right:20px;
background:#A83232;
color:white;
padding:15px;
border-radius:50%;
cursor:pointer;
}

</style>
</head>

<body>

<header class="navbar">
<div class="logo">
<img src="hanuman-logo.png">
Astrodhani
</div>

<nav>
<a href="services.html">Services</a>
<a href="shop.html">Shop</a>
<a href="panchang.html">Panchang</a>
<a href="horoscope.html">Horoscope</a>
</nav>
</header>

<!-- HERO -->
<div class="hero">
<h1 id="typing-text"></h1>
<p>Accurate Vedic Astrology & Solutions</p>
<button onclick="location.href='services.html'">Explore</button>
</div>

<!-- PANCHANG -->
<div class="section reveal">
<h2>Panchang</h2>
<div class="grid">
<div class="card">View Panchang</div>
</div>
</div>

<!-- SERVICES -->
<div class="section reveal">
<h2>Services</h2>
<div class="grid">
<div class="card">Love Problem</div>
<div class="card">Career</div>
<div class="card">Evil Eye</div>
</div>
</div>

<!-- PRODUCTS -->
<div class="section reveal">
<h2>Products</h2>
<div class="grid">
<div class="card">Rudraksha</div>
<div class="card">Gemstones</div>
</div>
</div>

<!-- CTA -->
<div class="cta">
<h2>Talk to Astrologer</h2>
<button>Chat Now</button>
</div>

<!-- CHATBOT -->
<div id="chatbot"></div>
<div class="float-btn">🤖</div>

<script>

/* TYPING */
let text="Unlock Your Destiny 🔮";
let i=0;
function type(){
if(i<text.length){
document.getElementById("typing-text").innerHTML+=text[i];
i++;
setTimeout(type,40);
}}
type();

/* REVEAL */
const observer=new IntersectionObserver(entries=>{
entries.forEach(entry=>{
if(entry.isIntersecting){
entry.target.classList.add("active")
}
})
});
document.querySelectorAll(".reveal").forEach(el=>observer.observe(el));

/* PARTICLES */
for(let i=0;i<20;i++){
let p=document.createElement("div");
p.className="particle";
p.style.left=Math.random()*100+"vw";
p.style.animationDuration=(5+Math.random()*10)+"s";
document.body.appendChild(p);
}

</script>

</body>
</html>
