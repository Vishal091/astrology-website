<!-- ===== CATEGORIES (MOVED OUTSIDE HEADER) ===== -->

<div>🔮<span>Tarot</span></div>

</div>

🎁 First Chat Free
</div>
</div>

<!-- ===== HERO ===== -->

<img src="hanuman-logo.jpeg" class="hero-logo">

<p>Vedic Astrology & Divine Guidance 🔱</p>

<button onclick="location.href='services.html'">Explore Services</button>
<button onclick="openChat()">🎁 First Chat Free</button>
</div>

<!-- ===== CHAT MODAL (UNCHANGED STRUCTURE) ===== -->
<div id="astroChat" class="chat-modal">
<div class="chat-box">

<div class="chat-header">
🔮 Astrologer
<span onclick="closeChat()">✖</span>
</div>

<div id="userForm">
<input type="text" id="name" placeholder="Your Name">
<input type="date" id="dob">
<input type="time" id="tob">
<button onclick="startChat()">Start Chat</button>
</div>

<div id="chatArea" style="display:none;">
<div id="messages"></div>
<input id="userMsg">
<button onclick="sendMsg()">Send</button>
<div id="timer">⏳ 02:00</div>
</div>

</div>
</div>

<!-- ===== SCRIPTS ===== -->

<script type="module" src="auth.js"></script>

<script>

// NAV
function toggleMenu(){
document.getElementById("mobileMenu").classList.toggle("show");
}

// PROFILE
function toggleProfile(){
let menu=document.getElementById("profileMenu");
menu.style.display = menu.style.display==="block"?"none":"block";
}

// 🔥 OPEN CHAT (NEW)
function openChat(){
document.getElementById("astroChat").style.display="flex";
}

// CLOSE CHAT
function closeChat(){
document.getElementById("astroChat").style.display="none";
}

// 🔥 SINGLE CLEAN startChat()
function startChat(){

const name=document.getElementById("name").value.trim();
const dob=document.getElementById("dob").value;
const tob=document.getElementById("tob").value;

if(!name || !dob || !tob){
alert("Please fill all details 🙏");
return;
}

document.getElementById("userForm").style.display="none";
document.getElementById("chatArea").style.display="block";

botReply(`Namaste ${name} 🙏 Kundli analyze ho rahi hai...`);

simulateAstrologer();
startTimer();
}

// SEND MESSAGE
function sendMsg(){
const msg=document.getElementById("userMsg").value;
if(!msg) return;

addMsg("You: "+msg);
document.getElementById("userMsg").value="";

botReply("📡 Connecting astrologer...");
}

// MESSAGE
function addMsg(text){
const div=document.createElement("div");
div.innerText=text;
document.getElementById("messages").appendChild(div);
}

// BOT
function botReply(text){
addMsg("🔮 "+text);
}

// FAKE JOIN
function simulateAstrologer(){
const names=["Pandit Sharma Ji","Acharya Rahul Ji","Guru Prakash Ji"];
let i=0;

const interval=setInterval(()=>{
if(i<names.length){
botReply(names[i]+" joined...");
i++;
}else{
clearInterval(interval);
botReply("⏳ Astrologer will join shortly...");
}
},1200);
}

// TIMER
let time=120;

function startTimer(){
const interval=setInterval(()=>{
time--;
document.getElementById("timer").innerText="⏳ "+time;

if(time<=0){
clearInterval(interval);
alert("Free time over 💰");
}
},1000);
}

</script>

</body>
