<!DOCTYPE html>
<html>
<head>
<title>Astrodhani</title>

<meta name="description" content="Accurate astrology predictions, kundli, horoscope and remedies. Talk to astrologer instantly.">

<link rel="stylesheet" href="style.css">

<style>

/* ===== BODY ===== */
body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:#1a0f00;
color:white;
overflow-x:hidden;
}

/* ===== NAVBAR ===== */
.navbar{
position:fixed;
top:0;
width:100%;
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 40px;
background:rgba(0,0,0,0.5);
backdrop-filter:blur(10px);
z-index:1000;
}

.logo{
display:flex;
align-items:center;
gap:10px;
color:#FFD700;
font-weight:bold;
}

.logo img{
width:40px;
height:40px;
border-radius:50%;
}

nav a{
margin:0 10px;
text-decoration:none;
color:#FFD700;
}

nav a:hover{
color:#FF8C00;
}

/* ===== HERO ===== */
.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
background:linear-gradient(rgba(60,20,0,0.9), rgba(30,10,0,0.95)),
url('https://images.unsplash.com/photo-1500530855697-b586d89ba3ee');
background-size:cover;
background-attachment:fixed;
}

.hero h1{
font-size:52px;
background:linear-gradient(90deg,#FFD700,#FF8C00);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
animation:glow 3s infinite alternate;
}

@keyframes glow{
from{filter:drop-shadow(0 0 5px #FF8C00);}
to{filter:drop-shadow(0 0 20px #FFD700);}
}

.hero button{
padding:15px 35px;
border:none;
border-radius:10px;
background:linear-gradient(90deg,#FF8C00,#FFD700);
color:black;
font-weight:bold;
cursor:pointer;
}

/* TRUST */
.trust{
display:flex;
gap:40px;
margin-top:30px;
flex-wrap:wrap;
justify-content:center;
}

.trust div{
background:rgba(255,165,0,0.1);
padding:15px;
border-radius:12px;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
gap:20px;
padding:40px;
}

/* CARD */
.card-premium{
background:rgba(255,165,0,0.05);
padding:20px;
border-radius:12px;
border:1px solid rgba(255,165,0,0.2);
transition:0.3s;
}

.card-premium:hover{
transform:translateY(-10px);
box-shadow:0 0 20px rgba(255,165,0,0.5);
}

/* ZODIAC */
#zodiac-wheel{
width:220px;
height:220px;
border-radius:50%;
border:2px solid rgba(255,215,0,0.4);
margin:20px auto;
position:relative;
animation:spin 25s linear infinite;
}

@keyframes spin{
from{transform:rotate(0deg);}
to{transform:rotate(360deg);}
}

.zodiac-item{
position:absolute;
width:40px;
height:40px;
display:flex;
align-items:center;
justify-content:center;
}

/* TESTIMONIAL */
.testimonial-track{
display:flex;
gap:20px;
animation:scroll 20s linear infinite;
}

.testimonial{
min-width:250px;
padding:20px;
background:rgba(255,165,0,0.1);
border-radius:12px;
}

/* CTA */
.cta-section{
padding:100px;
text-align:center;
background:linear-gradient(90deg,#FF8C00,#FFD700);
color:black;
}

/* CHATBOT */
#chatbot{
position:fixed;
bottom:90px;
right:20px;
width:280px;
background:#111;
border-radius:12px;
display:none;
flex-direction:column;
}

#chat-header{
background:#FF8C00;
padding:10px;
}

#chat-body{
height:200px;
overflow-y:auto;
padding:10px;
}

#chat-input{
border:none;
padding:10px;
}

/* FLOAT BTN */
.float-btn{
position:fixed;
bottom:20px;
right:20px;
background:#FF8C00;
padding:15px;
border-radius:50%;
cursor:pointer;
}

</style>
</head>

<body>

<header class="navbar">
<div class="logo">
<img src="hanuman-logo.png">
<span>Astrodhani</span>
</div>

<nav>
<a href="index.html">Home</a>
<a href="services.html">Services</a>
<a href="horoscope.html">Horoscope</a>
<a href="panchang.html">Panchang</a>
</nav>
</header>

<!-- HERO -->
<div class="hero">

<h1 id="typing-text"></h1>

<div id="zodiac-wheel"></div>
<div id="daily-update"></div>

<p>Vedic Astrology & Divine Solutions 🔱</p>

<button onclick="window.location.href='services.html'">
Explore Services
</button>

<div class="trust">
<div><h2 class="counter" data-target="50000">0</h2><p>Happy Clients</p></div>
<div><h2 class="counter" data-target="4.8">0</h2><p>Rating</p></div>
<div><h2>24/7</h2><p>Support</p></div>
</div>

</div>

<!-- SERVICES -->
<div class="grid">
<div class="card-premium">❤️ Love Problem</div>
<div class="card-premium">💰 Career Growth</div>
<div class="card-premium">🧿 Protection</div>
<div class="card-premium">🔮 Healing</div>
</div>

<!-- TESTIMONIAL -->
<div class="section">
<h2>💬 Real Results</h2>
<div class="testimonial-track">
<div class="testimonial">Got my ex back 🙏</div>
<div class="testimonial">Income doubled 💰</div>
<div class="testimonial">Accurate reading 🔮</div>
</div>
</div>

<!-- CTA -->
<div class="cta-section">
<h2>Talk to Astrologer</h2>
<button onclick="window.open('https://wa.me/91XXXXXXXXXX')">
Chat Now
</button>
</div>

<!-- CHATBOT -->
<div id="chatbot">
<div id="chat-header">🔮 Astrologer</div>
<div id="chat-body"></div>
<input id="chat-input">
</div>

<div class="float-btn" onclick="toggleChat()">🤖</div>

<script>

/* TYPING */
const text="Unlock Your Destiny 🔮";
let i=0;
function typeEffect(){
if(i<text.length){
document.getElementById("typing-text").innerHTML+=text[i];
i++;
setTimeout(typeEffect,40);
}}
typeEffect();

/* ZODIAC */
const zodiac=["♈","♉","♊","♋","♌","♍","♎","♏","♐","♑","♒","♓"];
const wheel=document.getElementById("zodiac-wheel");
zodiac.forEach((s,i)=>{
let angle=(i/12)*360;
let el=document.createElement("div");
el.className="zodiac-item";
el.innerHTML=s;
el.style.transform=`rotate(${angle}deg) translate(90px) rotate(-${angle}deg)`;
wheel.appendChild(el);
});

/* DAILY */
const updates=["🌙 Moon strong","💰 Money luck","❤️ Love high","🪐 Discipline"];
document.getElementById("daily-update").innerText=
updates[new Date().getDate()%updates.length];

/* CHAT */
function toggleChat(){
let c=document.getElementById("chatbot");
c.style.display=c.style.display==="flex"?"none":"flex";
}

document.getElementById("chat-input").addEventListener("keypress",function(e){
if(e.key==="Enter"){
let q=this.value;
addMsg("You: "+q);
addMsg("Astrologer: Stay positive ✨");
this.value="";
}
});

function addMsg(t){
let d=document.createElement("div");
d.innerText=t;
document.getElementById("chat-body").appendChild(d);
}

</script>

</body>
</html>
