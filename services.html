
<!DOCTYPE html>
<html>
<head>
<title>Astrodhani Services</title>
<link rel="stylesheet" href="style.css">

<style>

/* CATEGORY TITLE */
.category-title{
margin-top:40px;
font-size:24px;
color:#F9CA24;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}

/* CARD */
.service-card{
background:linear-gradient(145deg,#141A40,#0B0F2A);
border-radius:18px;
padding:20px;
display:flex;
flex-direction:column;
justify-content:space-between;
align-items:center;
text-align:center;
aspect-ratio:1/1;
border:1px solid rgba(255,255,255,0.08);
position:relative;
transition:0.3s;
}

.service-card:hover{
transform:translateY(-10px) scale(1.02);
box-shadow:0 0 30px rgba(108,92,231,0.4);
}

/* ICON */
.service-icon{
font-size:26px;
}

/* BADGES */
.badge{
position:absolute;
top:10px;
left:10px;
font-size:11px;
padding:4px 8px;
border-radius:6px;
font-weight:bold;
}
.trending{background:#ff7675;}
.recommended{background:#00cec9;}

/* REVIEWS */
.reviews{font-size:12px;}
.stars{color:#FFD700;}
.rating-text{color:#bbb;}

/* PRICE */
.old-price{text-decoration:line-through;color:#888;font-size:12px;}
.new-price{color:#00ffae;font-size:18px;font-weight:bold;}

/* BUTTON */
.service-card button{
width:100%;
padding:10px;
border-radius:10px;
background:linear-gradient(90deg,#6C5CE7,#00CEC9);
border:none;
color:white;
font-weight:bold;
cursor:pointer;
}

</style>
</head>

<body>

<header>
<div class="logo">🔮 Astrodhani</div>
<nav>
<a href="index.html">Home</a>
<a href="shop.html">Shop</a>
<a href="cart.html">Cart</a>
</nav>
</header>

<div class="container">
<h1>✨ Premium Astrology Services</h1>

<h2 class="category-title">❤️ Love & Relationship</h2>
<div class="grid" id="love"></div>

<h2 class="category-title">💰 Money / Career</h2>
<div class="grid" id="money"></div>

<h2 class="category-title">🧿 Evil Eye Protection</h2>
<div class="grid" id="evil"></div>

<h2 class="category-title">🛕 Pooja Services</h2>
<div class="grid" id="pooja"></div>

<h2 class="category-title">🔮 Healing</h2>
<div class="grid" id="healing"></div>

<h2 class="category-title">🧙 Spells</h2>
<div class="grid" id="spell"></div>

<h2 class="category-title">✨ Special Services</h2>
<div class="grid" id="special"></div>

<h2 class="category-title">🧠 Problem Solving</h2>
<div class="grid" id="problem"></div>

</div>

<script>

// CART
let cart = JSON.parse(localStorage.getItem("cart")) || []

// ICONS
const icons = {
love:"❤️", money:"💰", evil:"🧿", pooja:"🛕",
healing:"🔮", spell:"🧙", special:"✨", problem:"🧠"
}

// DATA (ALL SERVICES)
const data = {
love:["Love Attraction Healing","Bring Back Ex","Love Binding","Twin Flame Healing","Relationship Healing","Trust Rebuild","Soulmate Attraction"],
money:["Money Magnet","Business Growth","Career Growth","Job Attraction","Interview Success","Profit Flow"],
evil:["Evil Eye Removal","Nazar Nivaran","Aura Cleansing","Protection Shield","Negativity Removal"],
pooja:["Maha Rudrabhishek","Navgraha Shanti","Shani Shanti","Rahu Ketu","Kaal Sarp Dosh","Lakshmi Pooja","Santaan Prapti"],
healing:["Reiki Healing","Theta Healing","Heart Chakra","Business Healing","Money Healing","Career Healing"],
spell:["Love Spell","Money Spell","Protection Spell","Bring Back Ex Spell","Interview Spell"],
special:["Face Reading","Past Life","Kundli Matching","Vastu","Birth Time"],
problem:["Love Problem","Career Problem","Money Problem","Business Problem","Loan Mukti"]
}

// RENDER
function render(category, list){

let container = document.getElementById(category)

// pick 3-4 offers
let offers = [...list].sort(()=>0.5-Math.random()).slice(0,4)

list.forEach(item=>{

let price = Math.floor(Math.random()*2000)+499
let rating = (4+Math.random()).toFixed(1)
let reviews = Math.floor(Math.random()*2000)+100

let isOffer = offers.includes(item)

container.innerHTML += `
<div class="service-card">

${Math.random()>0.7 ? `<div class="badge trending">🔥</div>`:""}
${Math.random()>0.7 ? `<div class="badge recommended">⭐</div>`:""}

<div class="service-icon">${icons[category]}</div>

<div class="reviews">
<span class="stars">★★★★★</span>
<span class="rating-text">${rating} (${reviews})</span>
</div>

<h3>${item}</h3>

${isOffer ? `
<div class="old-price">₹${price+800}</div>
<div class="new-price">₹${price}</div>
<div class="urgency">⚡ Only ${Math.floor(Math.random()*5)+1} left</div>
<div class="social-proof">🔥 ${Math.floor(Math.random()*150)+50} booked today</div>
` : `<p>₹${price}</p>`}

<button class="book-btn" data-name="${item}" data-price="${price}">
Book Now
</button>

</div>
`

})

}

// RUN
for(let key in data){
render(key,data[key])
}

// BUTTON FIX
document.addEventListener("click", function(e){

if(e.target.classList.contains("book-btn")){

let name = e.target.dataset.name
let price = parseInt(e.target.dataset.price)

cart.push({name, price})
localStorage.setItem("cart", JSON.stringify(cart))

alert(name + " booked 🔮")

}

})

</script>

</body>
</html>
