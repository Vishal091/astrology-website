// ICON MAP
const icons = {
love:"❤️", money:"💰", evil:"🧿", pooja:"🛕",
healing:"🔮", spell:"🧙", special:"✨", problem:"🧠"
}


function render(category, list){

let container = document.getElementById(category)

// pick badges
let trendingItems = [...list].sort(()=>0.5-Math.random()).slice(0,2)
let recommendedItems = [...list].sort(()=>0.5-Math.random()).slice(0,2)

list.forEach(item=>{

let price = Math.floor(Math.random()*2000)+499
let rating = (4+Math.random()).toFixed(1)
let reviews = Math.floor(Math.random()*2000)+100

let isOffer = Math.random() > 0.6

let discountHTML = isOffer ? `
<div class="old-price">₹${price+800}</div>
<div class="new-price">₹${price}</div>
<div class="urgency">⚡ Only ${Math.floor(Math.random()*5)+1} left</div>
<div class="social-proof">🔥 ${Math.floor(Math.random()*150)+50} booked today</div>
` : `<p>₹${price}</p>`

container.innerHTML += `
<div class="service-card">

${trendingItems.includes(item) ? `<div class="badge trending">🔥 Trending</div>` : ""}
${recommendedItems.includes(item) ? `<div class="badge recommended">⭐ Recommended</div>` : ""}

<div class="service-icon">${icons[category]}</div>

<div class="reviews">
<span class="stars">★★★★★</span>
<span class="rating-text">${rating} (${reviews})</span>
</div>

<h3>${item}</h3>

${discountHTML}

<button class="book-btn" data-name="${item}" data-price="${price}">
Book Now
</button>

</div>
`

})

}

<script>

document.addEventListener("click", function(e){

if(e.target.classList.contains("book-btn")){

let name = e.target.getAttribute("data-name")
let price = parseInt(e.target.getAttribute("data-price"))

let cart = JSON.parse(localStorage.getItem("cart")) || []

cart.push({name, price})

localStorage.setItem("cart", JSON.stringify(cart))

alert(name + " booked 🔮")

}

})

</script>





// render all

}
