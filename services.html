
<!DOCTYPE html>
<html>
<head>
<title>Astrodhani Services</title>
<link rel="stylesheet" href="style.css">

<style>
.category-title{
margin-top:40px;
font-size:24px;
color:#F9CA24;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
gap:22px;
}

.service-card{
background:#141A40;
border-radius:16px;
padding:20px;
display:flex;
flex-direction:column;
align-items:center;
text-align:center;
min-height:300px;
border:1px solid rgba(255,255,255,0.08);
position:relative;
z-index:1;
}

.service-icon{
font-size:24px;
margin-bottom:5px;
}

.service-card h3{
margin:10px 0;
font-size:15px;
}

.reviews{
font-size:12px;
margin-bottom:6px;
}

.stars{color:#FFD700;}
.rating-text{color:#bbb;}

.old-price{
text-decoration:line-through;
color:#888;
font-size:12px;
}

.new-price{
color:#00ffae;
font-size:18px;
font-weight:bold;
}

.urgency,.social-proof{
font-size:12px;
}

.service-card button{
margin-top:auto;
width:100%;
padding:10px;
border-radius:8px;
background:#6C5CE7;
border:none;
color:white;
cursor:pointer;
z-index:10;
position:relative;
}
</style>
</head>

<body>

<header>
<div class="logo">🔮 Astrodhani</div>
<nav>
<a href="index.html">Home</a>
<a href="shop.html">Shop</a>
<a href="cart.html">Cart</a>
</nav>
</header>

<div class="container">

<h1>✨ Premium Astrology Services</h1>

<h2 class="category-title">❤️ Love & Relationship</h2>
<div class="grid" id="love"></div>

<h2 class="category-title">💰 Money / Career</h2>
<div class="grid" id="money"></div>

<h2 class="category-title">🧿 Evil Eye Protection</h2>
<div class="grid" id="evil"></div>

<h2 class="category-title">🛕 Pooja Services</h2>
<div class="grid" id="pooja"></div>

<h2 class="category-title">🔮 Healing</h2>
<div class="grid" id="healing"></div>

<h2 class="category-title">🧙 Spells</h2>
<div class="grid" id="spell"></div>

<h2 class="category-title">✨ Special Services</h2>
<div class="grid" id="special"></div>

<h2 class="category-title">🧠 Problem Solving</h2>
<div class="grid" id="problem"></div>

</div>

<script>

// YOUR WHATSAPP NUMBER (CHANGE THIS)
const phone = "918708833177"

// ICONS
const icons = {
love:"❤️", money:"💰", evil:"🧿", pooja:"🛕",
healing:"🔮", spell:"🧙", special:"✨", problem:"🧠"
}

// DATA
const data = {
love:["Love Attraction Healing","Bring Back Ex","Love Binding","Twin Flame Healing","Relationship Healing","Trust Rebuild","Soulmate Attraction"],
money:["Money Magnet","Business Growth","Career Growth","Job Attraction","Interview Success","Profit Flow"],
evil:["Evil Eye Removal","Nazar Nivaran","Aura Cleansing","Protection Shield","Negativity Removal"],
pooja:["Maha Rudrabhishek","Navgraha Shanti","Shani Shanti","Rahu Ketu","Kaal Sarp Dosh","Lakshmi Pooja","Santaan Prapti"],
healing:["Reiki Healing","Theta Healing","Heart Chakra","Business Healing","Money Healing","Career Healing"],
spell:["Love Spell","Money Spell","Protection Spell","Bring Back Ex Spell","Interview Spell"],
special:["Face Reading","Past Life","Kundli Matching","Vastu","Birth Time"],
problem:["Love Problem","Career Problem","Money Problem","Business Problem","Loan Mukti"]
}

// RENDER
function render(category, list){

let container = document.getElementById(category)
let offers = [...list].sort(()=>0.5-Math.random()).slice(0,3)

list.forEach(item=>{

let price = Math.floor(Math.random()*2000)+499
let rating = (4+Math.random()).toFixed(1)
let reviews = Math.floor(Math.random()*2000)+100
let isOffer = offers.includes(item)

container.innerHTML += `
<div class="service-card">

<div class="urgency">
⚡ Only ${Math.floor(Math.random()*3)+1} slots left today
</div>

<div class="service-icon">${icons[category]}</div>

<div class="reviews">
<span class="stars">★★★★★</span>
<span class="rating-text">${rating} (${reviews})</span>
</div>

<h3>${item}</h3>

${isOffer ? `
<div class="old-price">₹${price+800}</div>
<div class="new-price">₹${price}</div>
<div class="urgency">⚡ Only ${Math.floor(Math.random()*5)+1} slots left</div>
<div class="social-proof">🔥 ${Math.floor(Math.random()*150)+50} booked today</div>
` : `<p>₹${price}</p>`}

<button class="book-btn">Book Now</button>

</div>
`

})

}

// RENDER ALL
for(let key in data){
render(key,data[key])
}

// ===== WHATSAPP AUTOMATION (PRO) =====
setTimeout(() => {

let buttons = document.querySelectorAll(".book-btn")

buttons.forEach(btn => {

btn.addEventListener("click", function(){

let card = btn.closest(".service-card")

let name = card.querySelector("h3").innerText
let priceEl = card.querySelector(".new-price") || card.querySelector("p")
let price = parseInt(priceEl.innerText.replace("₹",""))

// SAVE CART
let cart = JSON.parse(localStorage.getItem("cart")) || []
cart.push({name, price})
localStorage.setItem("cart", JSON.stringify(cart))

// PRO MESSAGE
let message = `Namaste 🙏

I want to book this service urgently:

🔮 Service: ${name}
💰 Price: ₹${price}

I saw limited slots available. Please confirm quickly.`

let url = `https://wa.me/${phone}?text=${encodeURIComponent(message)}`

window.open(url, "_blank")

})

})

}, 300)

</script>

</body>
</html>
