
<!DOCTYPE html>
<html>
<head>
<title>Astrodhani Shop</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<div class="logo">🔮 Astrodhani</div>
<nav>
<a href="index.html">Home</a>
<a href="shop.html">Shop</a>
<a href="services.html">Services</a>
</nav>
</header>

<section class="shop-hero">
<h1>✨ Spiritual Store</h1>
<p>Energy. Healing. Transformation.</p>
</section>

<div class="shop-container">


<div class="product-card">

<img src="https://images.unsplash.com/photo-1611078489935-0cb964de46d6">

<h3>Money Magnet Bracelet</h3>
<p>₹399</p>

<button onclick="addToCart('Money Magnet Bracelet',399)">
Add to Cart
</button>

</div>




</div>

<script>

let cart = JSON.parse(localStorage.getItem("cart")) || []

function addToCart(name, price){
cart.push({name, price})
localStorage.setItem("cart", JSON.stringify(cart))
alert(name + " added to cart 🛒")
}

</script>
